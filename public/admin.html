<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin · 암송 구절 관리 — Victory Church</title>

  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">

  <style>
    :root {
      --bg:       #f6f7f9;
      --surface:  #ffffff;
      --line:     #e9eaee;
      --text:     #363636;
      --text-2:   #6b7280;
      --text-3:   #9ca3af;
      --brand:    #2bb673;
      --brand-dim:#e7f6ef;
      --navy:     #101a3f;
      --danger:   #dc2626;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont,
                   'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.01em;
    }
    .wrap {
      max-width: 560px;
      margin: 0 auto;
      padding: calc(env(safe-area-inset-top) + 28px) 20px
               calc(env(safe-area-inset-bottom) + 24px);
    }
    .header { text-align: center; margin-bottom: 24px; }
    .header h1 {
      font-size: 20px; font-weight: 700; color: var(--navy);
      margin: 0 0 4px; letter-spacing: -0.02em;
    }
    .header p { font-size: 13px; color: var(--text-2); margin: 0; font-weight: 500; }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 22px;
      margin-bottom: 14px;
    }
    .card h2 {
      font-size: 14px; font-weight: 700;
      color: var(--text); margin: 0 0 14px;
      letter-spacing: -0.01em;
    }
    label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--text-2); margin: 12px 0 6px;
      letter-spacing: 0.01em;
    }
    input[type="text"],
    input[type="password"],
    textarea {
      width: 100%;
      font-family: inherit;
      font-size: 15px;
      color: var(--text);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px 14px;
      outline: none;
      transition: border-color .15s ease, box-shadow .15s ease;
      letter-spacing: -0.01em;
    }
    textarea { min-height: 140px; resize: vertical; line-height: 1.55; }
    input:focus, textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px var(--brand-dim);
    }
    .row { display: flex; gap: 10px; margin-top: 16px; }
    .btn {
      flex: 1;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      border-radius: 12px;
      padding: 13px 16px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background .15s ease, border-color .15s ease, transform .08s ease;
      letter-spacing: -0.01em;
    }
    .btn:active { transform: scale(.99); }
    .btn-primary { background: var(--brand); color: #fff; }
    .btn-primary:hover { background: #25a266; }
    .btn-primary:disabled { background: #a5d8c0; cursor: not-allowed; }
    .btn-ghost {
      background: #fff; color: var(--text); border-color: var(--line);
    }
    .btn-ghost:hover { background: #fafbfc; border-color: #d4d6dc; }

    .preview {
      background: linear-gradient(180deg, #ffffff 0%, #f7faf8 100%);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
      position: relative;
      overflow: hidden;
    }
    .preview::before {
      content: ""; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; background: var(--brand); border-radius: 3px 0 0 3px;
    }
    .preview .label {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 700; color: var(--brand);
      letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 10px;
    }
    .preview .label::before {
      content: ""; width: 5px; height: 5px; border-radius: 50%;
      background: var(--brand);
    }
    .preview .text {
      font-size: 15px; line-height: 1.6; color: var(--text);
      font-weight: 500; white-space: pre-wrap; word-break: keep-all;
      margin: 0;
    }
    .preview .ref {
      display: block; margin-top: 10px; font-size: 13px;
      color: var(--text-2); font-weight: 600; text-align: right;
    }

    .meta {
      font-size: 12px; color: var(--text-3);
      margin-top: 10px; text-align: right;
    }
    .status {
      font-size: 13px; font-weight: 600;
      margin-top: 12px; min-height: 18px;
    }
    .status.ok { color: var(--brand); }
    .status.err { color: var(--danger); }

    .gate {
      max-width: 380px; margin: 80px auto 0;
    }
    .hidden { display: none !important; }

    .hint {
      font-size: 12px; color: var(--text-3);
      margin-top: 8px; line-height: 1.5;
    }
    a { color: var(--brand); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="wrap">

    <header class="header">
      <h1>암송 구절 관리</h1>
      <p>Victory Church · Admin</p>
    </header>

    <!-- 비밀번호 게이트 -->
    <section class="card gate" id="gate">
      <h2>관리자 인증</h2>
      <label for="passInput">비밀번호</label>
      <input type="password" id="passInput" autocomplete="current-password" placeholder="••••••••">
      <div class="row">
        <button class="btn btn-primary" id="btnUnlock" type="button">입장</button>
      </div>
      <div class="status err" id="gateStatus"></div>
      <p class="hint">※ 이 게이트는 단순 보호입니다. 실제 쓰기 보안은 Firestore 보안 규칙으로 합니다.</p>
    </section>

    <!-- 편집 영역 -->
    <section class="card hidden" id="editor">
      <h2>이번 주 암송 구절 편집</h2>

      <label for="verseText">구절 본문</label>
      <textarea id="verseText" placeholder="예) 하나님이 세상을 이처럼 사랑하사 독생자를 주셨으니…"></textarea>

      <label for="verseRef">출처</label>
      <input type="text" id="verseRef" placeholder="예) 요한복음 3:16">

      <div class="row">
        <button class="btn btn-ghost" id="btnReload" type="button">불러오기</button>
        <button class="btn btn-primary" id="btnSave" type="button">저장</button>
      </div>
      <div class="status" id="saveStatus"></div>
      <div class="meta" id="updatedMeta"></div>
    </section>

    <!-- 미리보기 -->
    <section class="card hidden" id="previewCard">
      <h2>미리보기 (사용자 화면)</h2>
      <div class="preview">
        <span class="label">이번 주 암송 구절</span>
        <p class="text" id="pvText">—</p>
        <span class="ref" id="pvRef"></span>
      </div>
      <p class="hint" style="margin-top:14px">저장하면 모든 사용자 화면에 실시간 반영됩니다.</p>
    </section>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, onSnapshot, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
    import { firebaseConfig, VERSE_DOC_PATH, ADMIN_PASSCODE } from "./firebase-config.js";

    const $ = (id) => document.getElementById(id);
    const gate = $('gate'), editor = $('editor'), previewCard = $('previewCard');
    const passInput = $('passInput'), gateStatus = $('gateStatus');
    const txt = $('verseText'), refIn = $('verseRef');
    const pvText = $('pvText'), pvRef = $('pvRef');
    const saveStatus = $('saveStatus'), updatedMeta = $('updatedMeta');

    // 입력값 미리보기에 즉시 반영
    function syncPreview() {
      pvText.textContent = txt.value.trim() || '—';
      pvRef.textContent  = refIn.value.trim();
    }
    txt.addEventListener('input', syncPreview);
    refIn.addEventListener('input', syncPreview);

    // 게이트
    function unlock() {
      const v = passInput.value;
      if (!v) { gateStatus.textContent = '비밀번호를 입력하세요.'; return; }
      if (v !== ADMIN_PASSCODE) {
        gateStatus.textContent = '비밀번호가 올바르지 않습니다.';
        return;
      }
      try { sessionStorage.setItem('vc_admin_ok', '1'); } catch (e) {}
      enterAdmin();
    }
    $('btnUnlock').addEventListener('click', unlock);
    passInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') unlock(); });

    // Firebase
    let db, ref;
    function initDb() {
      const app = initializeApp(firebaseConfig);
      db = getFirestore(app);
      ref = doc(db, VERSE_DOC_PATH.collection, VERSE_DOC_PATH.id);
    }

    function formatTime(ts) {
      if (!ts || !ts.toDate) return '';
      const d = ts.toDate();
      const pad = (n) => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    async function reload() {
      saveStatus.textContent = ''; saveStatus.className = 'status';
      try {
        const snap = await getDoc(ref);
        if (snap.exists()) {
          const d = snap.data() || {};
          txt.value   = d.text || '';
          refIn.value = d.reference || '';
          updatedMeta.textContent = d.updatedAt ? `마지막 수정: ${formatTime(d.updatedAt)}` : '';
        } else {
          txt.value = ''; refIn.value = '';
          updatedMeta.textContent = '아직 저장된 구절이 없습니다.';
        }
        syncPreview();
      } catch (e) {
        saveStatus.textContent = '불러오기 실패: ' + (e.message || e);
        saveStatus.className = 'status err';
      }
    }

    async function save() {
      const text = txt.value.trim();
      const reference = refIn.value.trim();
      if (!text) {
        saveStatus.textContent = '구절 본문을 입력하세요.';
        saveStatus.className = 'status err';
        return;
      }
      const btn = $('btnSave');
      btn.disabled = true;
      saveStatus.textContent = '저장 중…';
      saveStatus.className = 'status';
      try {
        await setDoc(ref, { text, reference, updatedAt: serverTimestamp() }, { merge: true });
        saveStatus.textContent = '저장되었습니다. 사용자 화면에 즉시 반영됩니다.';
        saveStatus.className = 'status ok';
      } catch (e) {
        saveStatus.textContent = '저장 실패: ' + (e.message || e);
        saveStatus.className = 'status err';
      } finally {
        btn.disabled = false;
      }
    }

    $('btnReload').addEventListener('click', reload);
    $('btnSave').addEventListener('click', save);

    function enterAdmin() {
      gate.classList.add('hidden');
      editor.classList.remove('hidden');
      previewCard.classList.remove('hidden');
      try { initDb(); } catch (e) {
        saveStatus.textContent = 'Firebase 초기화 실패: ' + (e.message || e);
        saveStatus.className = 'status err';
        return;
      }
      // 실시간으로 다른 기기 변경도 반영
      onSnapshot(ref, (snap) => {
        if (!snap.exists()) return;
        const d = snap.data() || {};
        // 사용자가 편집 중이지 않을 때만 동기화 — 단순화를 위해 항상 메타만 갱신
        updatedMeta.textContent = d.updatedAt ? `마지막 수정: ${formatTime(d.updatedAt)}` : '';
      });
      reload();
    }

    // 세션 유지: 새로고침해도 다시 묻지 않음
    try {
      if (sessionStorage.getItem('vc_admin_ok') === '1') enterAdmin();
    } catch (e) {}
  </script>

</body>
</html>
