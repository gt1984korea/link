name: Firebase 자동 배포

on:
  push:
    branches:
      - main   # main 브랜치에 push 할 때만 실행
    # 호스팅에 올라가지 않는 파일(firebase.json 의 ignore 목록과 동일)만 바뀐 push 는
    # 배포를 건너뛴다. 그렇지 않으면 라이브와 동일한 콘텐츠가 다시 올라가
    # "is the current active version" (FAILED_PRECONDITION) 으로 실패한다.
    paths-ignore:
      - '**/*.md'
      - 'functions/**'
      - 'tests/**'
      - 'docs/**'
      - 'public/**'
      - 'firestore.rules'
      - 'storage.rules'
      - '.github/**'
      - '_*'

jobs:
  deploy:
    name: Firebase Hosting 배포
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Firebase Hosting 배포
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_VICTORYCHURCH_665A9 }}'
          channelId: live
          projectId: victorychurch-665a9
