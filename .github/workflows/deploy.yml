name: Firebase 자동 배포

on:
  workflow_dispatch:   # Actions 탭에서 콘텐츠 변경 없이도 수동 배포 가능
  push:
    branches:
      - main   # main 브랜치에 push 할 때만 실행
    # 호스팅에 올라가지 않는 파일(firebase.json 의 ignore 목록과 동일)만 바뀐 push 는
    # 배포를 건너뛴다. (불필요한 재배포 방지)
    paths-ignore:
      - '**/*.md'
      - 'functions/**'
      - 'tests/**'
      - 'docs/**'
      - 'public/**'
      - 'firestore.rules'
      - 'storage.rules'
      - '.github/**'
      - '_*'

# 동일 브랜치에서 배포가 겹쳐 실행되면 같은 콘텐츠를 두 번 올려
# "is the current active version" 충돌이 날 수 있으므로, 진행 중인 배포가 있으면
# 이전 실행을 취소하고 최신 것만 남긴다.
concurrency:
  group: firebase-hosting-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Firebase Hosting 배포
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node 설정
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 서비스 계정 JSON 시크릿을 (워크스페이스 밖) 파일로 저장하고,
      # firebase-tools 가 ADC 로 인증하도록 경로를 환경변수로 내보낸다.
      # 워크스페이스 밖($HOME)에 두어야 호스팅으로 배포되지 않는다.
      - name: 서비스 계정 키 파일 생성
        run: |
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT_VICTORYCHURCH_665A9 }}' > "$HOME/firebase-sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/firebase-sa.json" >> "$GITHUB_ENV"

      # FirebaseExtended/action-hosting-deploy 대신 CLI 로 직접 배포한다.
      # 다만 콘텐츠가 라이브와 byte 단위로 동일하면 Firebase 는 같은 content-hash
      # version 을 재사용하고, 이미 활성(active)인 그 버전을 다시 release 하려다
      # 400 FAILED_PRECONDITION ("supplied version ... is the current active
      # version") 으로 실패한다. 이 경우 사이트는 이미 원하는 상태이므로
      # 에러를 무시하고 성공으로 처리한다. 그 외 에러는 그대로 실패시킨다.
      - name: Firebase Hosting 배포
        run: |
          set +e
          out=$(npx --yes firebase-tools@latest deploy --only hosting --project victorychurch-665a9 --non-interactive 2>&1)
          code=$?
          set -e
          echo "$out"
          if [ "$code" -ne 0 ]; then
            if echo "$out" | grep -q "is the current active version"; then
              echo "ℹ️  배포할 콘텐츠가 이미 라이브 버전과 동일합니다. 재배포를 건너뜁니다 (성공 처리)."
              exit 0
            fi
            exit "$code"
          fi
