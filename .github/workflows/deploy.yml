name: Firebase 자동 배포

on:
  push:
    branches:
      - main   # main 브랜치에 push 할 때만 실행
    # 호스팅에 올라가지 않는 파일(firebase.json 의 ignore 목록과 동일)만 바뀐 push 는
    # 배포를 건너뛴다. 그렇지 않으면 라이브와 동일한 콘텐츠가 다시 올라가
    # "is the current active version" (FAILED_PRECONDITION) 으로 실패한다.
    paths-ignore:
      - '**/*.md'
      - 'functions/**'
      - 'tests/**'
      - 'docs/**'
      - 'public/**'
      - 'firestore.rules'
      - 'storage.rules'
      - '.github/**'
      - '_*'

# 배포가 동시에 두 개 겹치면 같은 버전을 두 번 release 하려다
# FAILED_PRECONDITION 이 날 수 있어 한 번에 하나만 실행한다.
concurrency:
  group: firebase-hosting-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Firebase Hosting 배포
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Firebase Hosting 배포
        env:
          # FirebaseExtended/action-hosting-deploy 가 쓰던 것과 동일한 서비스 계정 JSON 시크릿.
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_VICTORYCHURCH_665A9 }}
        run: |
          printf '%s' "$FIREBASE_SA" > "$GOOGLE_APPLICATION_CREDENTIALS"

          set +e
          out=$(npx -y firebase-tools deploy --only hosting \
                  --project victorychurch-665a9 --non-interactive 2>&1)
          code=$?
          echo "$out"
          rm -f "$GOOGLE_APPLICATION_CREDENTIALS"

          if [ $code -ne 0 ]; then
            # 네트워크 끊김(premature close) 후 release 요청이 자동 재시도되면서,
            # 이미 서버에 반영된 버전을 다시 release 하려다 나는 "가짜 실패"다.
            # 이 메시지가 보이면 우리가 올린 콘텐츠는 이미 라이브이므로 성공으로 처리한다.
            # (콘텐츠가 라이브와 완전히 동일할 때 나는 경우도 의미상 '이미 반영됨' = 성공)
            if echo "$out" | grep -q "is the current active version"; then
              echo "::warning::새 버전이 이미 라이브에 반영됨(중복 release 재시도로 인한 가짜 실패) — 성공 처리합니다."
              exit 0
            fi
            exit $code
          fi
