name: Firebase 자동 배포

on:
  push:
    branches:
      - main   # main 브랜치에 push 할 때만 실행

jobs:
  deploy:
    name: Firebase Hosting 배포
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Firebase Hosting 배포
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_VICTORYCHURCH_665A9 }}'
          channelId: live
          projectId: victorychurch-665a9
