<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Victory Church — 뉴질랜드 빅토리처치</title>

  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#101a3f">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="apple-mobile-web-app-title" content="Victory Church">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <!-- Fonts: Slab Serif (display) + Old Style Serif (body) + Mono (label) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Roboto+Slab:wght@500;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --ink:       #101a3f;   /* logo navy */
      --ink-soft:  #1f2d6b;
      --paper:     #f3ecd9;   /* warm cream */
      --paper-2:   #ece2c8;
      --gold:      #b88a3a;   /* aged brass accent */
      --rule:      rgba(16,26,63,.18);
      --rule-2:    rgba(16,26,63,.32);
      --shadow:    0 1px 0 rgba(16,26,63,.06), 0 18px 40px -22px rgba(16,26,63,.35);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: 'Cormorant Garamond', 'Apple SD Gothic Neo', 'Malgun Gothic', Georgia, serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100%;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      position: relative;
    }

    /* Paper grain + cross pattern atmosphere */
    body::before {
      content: "";
      position: fixed; inset: 0;
      background-image:
        radial-gradient(rgba(16,26,63,.05) 1px, transparent 1px);
      background-size: 3px 3px;
      pointer-events: none;
      z-index: 0;
      opacity: .55;
    }
    body::after {
      content: "";
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--rule) 1px, transparent 1px),
        linear-gradient(90deg, var(--rule) 1px, transparent 1px);
      background-size: 64px 64px;
      mask-image: radial-gradient(ellipse at center, rgba(0,0,0,.4), transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse at center, rgba(0,0,0,.4), transparent 70%);
      pointer-events: none;
      z-index: 0;
      opacity: .35;
    }

    .frame {
      position: relative;
      z-index: 1;
      max-width: 560px;
      margin: 0 auto;
      padding:
        calc(env(safe-area-inset-top) + 28px)
        24px
        calc(env(safe-area-inset-bottom) + 28px);
    }

    /* Corner marks — editorial / blueprint feel */
    .corners { position: absolute; inset: 16px; pointer-events: none; }
    .corners span {
      position: absolute; width: 18px; height: 18px;
      border: 1.5px solid var(--ink);
    }
    .corners span:nth-child(1) { top: 0; left: 0; border-right: 0; border-bottom: 0; }
    .corners span:nth-child(2) { top: 0; right: 0; border-left: 0; border-bottom: 0; }
    .corners span:nth-child(3) { bottom: 0; left: 0; border-right: 0; border-top: 0; }
    .corners span:nth-child(4) { bottom: 0; right: 0; border-left: 0; border-top: 0; }

    /* Masthead */
    .mast {
      text-align: center;
      padding: 12px 0 18px;
      position: relative;
    }
    .mast .label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      letter-spacing: 0.32em;
      color: var(--ink);
      opacity: .65;
      display: flex; align-items: center; justify-content: center;
      gap: 10px;
      margin-bottom: 22px;
    }
    .mast .label::before, .mast .label::after {
      content: ""; height: 1px; width: 36px; background: var(--ink); opacity: .35;
    }

    .crest {
      width: 116px; height: 116px;
      margin: 0 auto 18px;
      position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    .crest::before, .crest::after {
      content: ""; position: absolute; inset: 0;
      border: 1px solid var(--ink); opacity: .35;
    }
    .crest::after {
      transform: rotate(45deg);
    }
    .crest img {
      width: 84px; height: 84px;
      object-fit: contain;
      image-rendering: -webkit-optimize-contrast;
      filter: drop-shadow(0 2px 0 rgba(16,26,63,.08));
    }

    .mast h1 {
      font-family: 'Roboto Slab', 'Cormorant Garamond', serif;
      font-weight: 900;
      font-size: clamp(38px, 9vw, 54px);
      line-height: .95;
      letter-spacing: -0.02em;
      margin: 0;
      color: var(--ink);
      text-transform: uppercase;
    }
    .mast h1 .amp {
      display: inline-block;
      color: var(--gold);
      font-style: italic;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500;
      transform: translateY(2px);
      padding: 0 4px;
    }

    .mast .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 18px;
      color: var(--ink-soft);
      margin: 10px 0 0;
      letter-spacing: .01em;
    }

    .mast .rule {
      display: flex; align-items: center; justify-content: center;
      gap: 12px;
      margin: 22px 0 4px;
    }
    .mast .rule .line { flex: 0 1 100px; height: 1px; background: var(--ink); opacity: .4; }
    .mast .rule .dot {
      width: 6px; height: 6px; transform: rotate(45deg);
      background: var(--gold);
    }

    .mast .verse {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 14px;
      color: var(--ink);
      opacity: .65;
      margin-top: 6px;
    }
    .mast .verse b { font-style: normal; font-weight: 600; letter-spacing: .08em; font-size: 11px; }

    /* Index header */
    .index-head {
      display: flex; justify-content: space-between; align-items: baseline;
      margin: 38px 4px 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--ink);
      opacity: .7;
    }
    .index-head .line {
      flex: 1; height: 1px; background: var(--ink); opacity: .35; margin: 0 14px; transform: translateY(-3px);
    }

    /* Menu — editorial entries */
    .menu { display: flex; flex-direction: column; }

    .entry {
      position: relative;
      width: 100%;
      background: transparent;
      border: 0;
      border-top: 1px solid var(--rule-2);
      padding: 22px 4px;
      cursor: pointer;
      text-align: left;
      font: inherit;
      color: var(--ink);
      display: grid;
      grid-template-columns: 44px 1fr auto;
      align-items: center;
      gap: 16px;
      transition: background .35s ease, padding .25s ease;
    }
    .entry:last-of-type { border-bottom: 1px solid var(--rule-2); }
    .entry:hover {
      background: linear-gradient(90deg, rgba(16,26,63,.04), transparent 80%);
      padding-left: 12px;
    }
    .entry:active { transform: translateY(1px); }

    .entry .num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: .18em;
      color: var(--gold);
      font-weight: 500;
      padding-top: 4px;
      align-self: start;
    }
    .entry .num::before { content: "№ "; opacity: .7; }

    .entry .body { min-width: 0; }
    .entry .name {
      font-family: 'Roboto Slab', serif;
      font-weight: 800;
      font-size: 22px;
      letter-spacing: -0.01em;
      line-height: 1.15;
      color: var(--ink);
      display: block;
      margin-bottom: 4px;
    }
    .entry .desc {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 15px;
      color: var(--ink-soft);
      opacity: .85;
      line-height: 1.35;
      display: block;
    }
    .entry .desc .sep {
      display: inline-block;
      width: 4px; height: 4px;
      background: var(--gold); transform: rotate(45deg) translateY(-2px);
      margin: 0 8px;
      vertical-align: middle;
    }

    .entry .arrow {
      width: 36px; height: 36px;
      border: 1px solid var(--ink);
      display: flex; align-items: center; justify-content: center;
      transition: background .25s ease, color .25s ease, transform .25s ease;
      color: var(--ink);
      font-family: 'Roboto Slab', serif;
      font-size: 18px;
      line-height: 1;
    }
    .entry:hover .arrow {
      background: var(--ink); color: var(--paper);
      transform: translateX(4px);
    }

    /* Featured (primary) entry — accentuated */
    .entry.feature {
      background: var(--ink);
      color: var(--paper);
      border: 1px solid var(--ink);
      padding: 26px 18px;
      margin-bottom: 22px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }
    .entry.feature::after {
      content: "";
      position: absolute; right: -40px; top: -40px;
      width: 160px; height: 160px;
      border: 1px solid rgba(243,236,217,.18);
      transform: rotate(45deg);
      pointer-events: none;
    }
    .entry.feature:hover { padding-left: 24px; background: var(--ink); }
    .entry.feature .num { color: var(--gold); }
    .entry.feature .name { color: var(--paper); font-size: 24px; }
    .entry.feature .desc { color: var(--paper-2); opacity: .85; }
    .entry.feature .desc .sep { background: var(--gold); }
    .entry.feature .arrow { border-color: var(--paper); color: var(--paper); }
    .entry.feature:hover .arrow { background: var(--paper); color: var(--ink); }

    /* Installed state */
    .entry.feature.installed {
      background: var(--paper);
      color: var(--ink);
      border: 1px solid var(--ink);
    }
    .entry.feature.installed::after { border-color: rgba(16,26,63,.18); }
    .entry.feature.installed .name { color: var(--ink); }
    .entry.feature.installed .desc { color: var(--ink-soft); opacity: 1; }
    .entry.feature.installed .arrow { border-color: var(--ink); color: var(--ink); background: var(--gold); }
    .entry.feature.installed .arrow.tick::after {
      content: "✓"; font-family: 'Roboto Slab', serif; font-weight: 900;
    }

    /* 로딩 상태 (설치 진행 중) */
    .entry.feature.loading { cursor: progress; }
    .entry.feature.loading .arrow {
      border-color: var(--paper);
      background: transparent;
      color: transparent;
      position: relative;
    }
    .entry.feature.loading .arrow::after {
      content: "";
      position: absolute; inset: 6px;
      border: 2px solid rgba(243,236,217,.25);
      border-top-color: var(--paper);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 진행 바 — 잉크 라인이 차오름 */
    .entry.feature .progress {
      position: absolute;
      left: 0; bottom: 0;
      height: 2px;
      width: 0;
      background: var(--gold);
      transition: width .25s ease;
    }
    .entry.feature.loading .progress { width: 100%; transition: width 2.4s ease; }

    /* Footer colophon */
    .colophon {
      margin-top: 44px;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: var(--ink);
      opacity: .55;
      line-height: 1.9;
    }
    .colophon .dot { color: var(--gold); margin: 0 6px; }
    .colophon .sig {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 13px;
      letter-spacing: .02em;
      text-transform: none;
      opacity: .85;
      margin-top: 8px;
    }

    /* Toast — engraved nameplate */
    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(env(safe-area-inset-bottom) + 28px);
      transform: translateX(-50%) translateY(20px);
      background: var(--ink);
      color: var(--paper);
      padding: 14px 22px;
      font-family: 'Roboto Slab', serif;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: .12em;
      text-transform: uppercase;
      box-shadow: 0 22px 50px -18px rgba(16,26,63,.6);
      opacity: 0;
      pointer-events: none;
      transition: opacity .35s ease, transform .35s ease;
      z-index: 2147483647;
      white-space: nowrap;
      border: 1px solid var(--gold);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Page-in animation */
    .reveal { opacity: 0; transform: translateY(8px); animation: rise .9s cubic-bezier(.2,.7,.2,1) forwards; }
    .reveal.d1 { animation-delay: .05s; }
    .reveal.d2 { animation-delay: .15s; }
    .reveal.d3 { animation-delay: .25s; }
    .reveal.d4 { animation-delay: .35s; }
    .reveal.d5 { animation-delay: .45s; }
    .reveal.d6 { animation-delay: .55s; }
    .reveal.d7 { animation-delay: .65s; }
    .reveal.d8 { animation-delay: .75s; }
    @keyframes rise { to { opacity: 1; transform: translateY(0); } }

    /* Mobile tweaks */
    @media (max-width: 420px) {
      .frame { padding-left: 18px; padding-right: 18px; }
      .entry { grid-template-columns: 38px 1fr auto; gap: 12px; }
      .entry .name { font-size: 20px; }
      .entry .desc { font-size: 14px; }
      .mast h1 { font-size: 44px; }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .reveal { opacity: 1; transform: none; animation: none; }
      .entry, .entry .arrow, .toast { transition: none; }
    }
  </style>
</head>
<body>

  <div class="corners"><span></span><span></span><span></span><span></span></div>

  <main class="frame">

    <!-- Masthead -->
    <header class="mast">
      <div class="label reveal d1">EST · 뉴질랜드 · CHRIST IS KING</div>

      <div class="crest reveal d2">
        <img src="https://cdn.imweb.me/thumbnail/20260516/33c296729aee7.png" alt="Victory Church 로고">
      </div>

      <h1 class="reveal d3">Victory<span class="amp">&amp;</span>Church</h1>

      <p class="tagline reveal d4">뉴질랜드 빅토리처치 — 승리하신 그리스도와 함께</p>

      <div class="rule reveal d5">
        <span class="line"></span><span class="dot"></span><span class="line"></span>
      </div>
      <p class="verse reveal d5">
        <b>JOHN 16:33</b> &nbsp;·&nbsp; <i>“내가 세상을 이기었노라”</i>
      </p>
    </header>

    <!-- Index -->
    <div class="index-head reveal d6">
      <span>Index</span>
      <span class="line"></span>
      <span>04 entries</span>
    </div>

    <nav class="menu">

      <!-- Featured: 바로가기 만들기 -->
      <button class="entry feature reveal d6" id="btnInstall" type="button" data-a2hs>
        <span class="num">01</span>
        <span class="body">
          <span class="name">이 페이지 바로가기 만들기</span>
          <span class="desc">내 폰·PC 홈에 설치 <span class="sep"></span> 다음엔 한 번에 열어요</span>
        </span>
        <span class="arrow">→</span>
        <span class="progress"></span>
      </button>

      <!-- Homepage -->
      <button class="entry reveal d7" id="btnHome" type="button">
        <span class="num">02</span>
        <span class="body">
          <span class="name">교회 홈페이지</span>
          <span class="desc">victorychurch.nz <span class="sep"></span> 공지·예배 안내</span>
        </span>
        <span class="arrow">→</span>
      </button>

      <!-- YouTube -->
      <button class="entry reveal d7" id="btnYoutube" type="button">
        <span class="num">03</span>
        <span class="body">
          <span class="name">YouTube 영상</span>
          <span class="desc">@nzvictory <span class="sep"></span> 지난 설교 다시 보기</span>
        </span>
        <span class="arrow">→</span>
      </button>

      <!-- Live -->
      <button class="entry reveal d8" id="btnLive" type="button">
        <span class="num">04</span>
        <span class="body">
          <span class="name">실시간 라이브</span>
          <span class="desc">Live Worship <span class="sep"></span> 예배 함께 드리기</span>
        </span>
        <span class="arrow">→</span>
      </button>

    </nav>

    <!-- Colophon -->
    <footer class="colophon reveal d8">
      <div>Soli Deo Gloria <span class="dot">◆</span> Auckland · New Zealand</div>
      <div class="sig">© Victory Church NZ</div>
    </footer>

  </main>

  <div class="toast" id="toast">바로가기 설치 완료</div>

  <script>
    // 외부 링크 열기
    function openExternal(url) {
      window.open(url, '_blank', 'noopener,noreferrer');
    }
    document.getElementById('btnHome').addEventListener('click', function () {
      openExternal('https://victorychurch.nz/');
    });
    document.getElementById('btnYoutube').addEventListener('click', function () {
      openExternal('https://www.youtube.com/@nzvictory/videos');
    });
    document.getElementById('btnLive').addEventListener('click', function () {
      openExternal('https://www.youtube.com/@nzvictory/streams');
    });

    // 토스트
    var toastEl = document.getElementById('toast');
    var toastTimer = null;
    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function () { toastEl.classList.remove('show'); }, 2400);
    }

    // 설치 버튼 상태 관리
    var installBtn = document.getElementById('btnInstall');
    var installLoadingTimer = null;

    function setInstalled() {
      stopLoading();
      installBtn.classList.add('installed');
      installBtn.querySelector('.name').textContent = '바로가기가 설치되어 있어요';
      installBtn.querySelector('.desc').innerHTML = '홈 화면 아이콘에서 바로 열어보세요 <span class="sep"></span> Soli Deo Gloria';
      var arrow = installBtn.querySelector('.arrow');
      arrow.textContent = '✓';
      arrow.classList.add('tick');
    }
    function startLoading() {
      if (installBtn.classList.contains('installed')) return;
      installBtn.classList.add('loading');
      installBtn.setAttribute('aria-busy', 'true');
    }
    function stopLoading() {
      installBtn.classList.remove('loading');
      installBtn.removeAttribute('aria-busy');
      clearTimeout(installLoadingTimer);
      installLoadingTimer = null;
    }

    // 사용자가 설치 버튼을 누른 순간 → 로딩 시작
    // (a2hs.js의 [data-a2hs] 핸들러보다 먼저 실행되도록 capture phase 사용)
    installBtn.addEventListener('click', function () {
      if (installBtn.classList.contains('installed')) return;
      startLoading();
      // 최대 12초 후 자동 해제 (사용자가 시스템 프롬프트를 닫거나 안내 시트를 닫은 경우 대비)
      installLoadingTimer = setTimeout(function () { stopLoading(); }, 12000);
    }, true);

    // 안내 시트가 닫히면 로딩도 해제 (iOS/데스크톱: 사용자가 수동으로 닫는 경우)
    // a2hs.js가 만든 .a2hs-sheet 의 닫힘을 MutationObserver로 감지
    function observeSheet() {
      var sheet = document.querySelector('.a2hs-sheet');
      if (!sheet) { return setTimeout(observeSheet, 300); }
      var mo = new MutationObserver(function () {
        if (!sheet.classList.contains('show')) stopLoading();
      });
      mo.observe(sheet, { attributes: true, attributeFilter: ['class'] });
    }
    observeSheet();

    // PWA 네이티브 설치 완료 이벤트 (안드로이드 크롬, 데스크톱 크롬/엣지)
    window.addEventListener('appinstalled', function () {
      try { localStorage.setItem('a2hs_installed', '1'); } catch (e) {}
      setInstalled();
      showToast('바로가기 설치 완료');
    });

    // a2hs.js 네이티브 프롬프트 결과 — 사용자가 거절하면 로딩 해제
    window.addEventListener('a2hs:result', function (e) {
      if (e.detail && e.detail.outcome !== 'accepted') stopLoading();
    });

    // ⚠️ 자동 "설치 완료" 표시 제거:
    // - localStorage 만 보고 완료로 표시하지 않습니다.
    // - standalone 모드(홈 화면 아이콘으로 열린 경우)에만 조용히 완료 상태로 둡니다.
    var isStandalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
                       || window.navigator.standalone === true;
    if (isStandalone) {
      // 이미 홈 화면 앱으로 열린 상태 → 토스트 없이 상태만 표시
      try { localStorage.setItem('a2hs_installed', '1'); } catch (e) {}
      setInstalled();
    }

    // 서비스워커
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch(function(){});
    }
  </script>

  <!-- A2HS 위젯 -->
  <script src="a2hs.js" defer
    data-site-name="Victory Church"
    data-icon="https://cdn.imweb.me/thumbnail/20260516/33c296729aee7.png"
    data-auto-banner="false"></script>
</body>
</html>
