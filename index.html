<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Victory Church — 뉴질랜드 빅토리처치</title>

  <link rel="manifest" href="manifest.webmanifest?v=2">
  <meta name="theme-color" content="#ffffff">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png?v=2">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png?v=2">
  <link rel="apple-touch-icon" href="icon-192.png?v=2">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-192.png?v=2">
  <meta name="apple-mobile-web-app-title" content="Victory Church">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <!-- Pretendard (원본 사이트와 동일) -->
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">

  <style>
    :root {
      --bg:       #ffffff;
      --surface:  #ffffff;
      --line:     #e9eaee;
      --text:     #363636;     /* 원본 본문색 */
      --text-2:   #6b7280;
      --text-3:   #9ca3af;
      --brand:    #2bb673;     /* 원본 민트그린 */
      --brand-dim:#e7f6ef;
      --navy:     #101a3f;     /* 로고 네이비 */
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont,
                   'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100%;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-feature-settings: "ss06", "ss07";
      letter-spacing: -0.01em;
    }

    .wrap {
      max-width: 480px;
      margin: 0 auto;
      padding:
        calc(env(safe-area-inset-top) + 32px)
        20px
        calc(env(safe-area-inset-bottom) + 24px);
    }

    /* Header */
    .header {
      text-align: center;
      padding-bottom: 28px;
    }
    .logo {
      width: 96px;
      margin: 0 auto 16px;
    }
    .logo img {
      width: 100%;
      height: auto;
      display: block;
      image-rendering: -webkit-optimize-contrast;
    }
    .header h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--navy);
      margin: 0 0 6px;
      letter-spacing: -0.02em;
    }
    .header p {
      font-size: 14px;
      color: var(--text-2);
      margin: 0;
      font-weight: 500;
    }

    /* Menu */
    .menu {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .item {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color .15s ease, background .15s ease, transform .08s ease;
      position: relative;
      overflow: hidden;
    }
    .item:hover { border-color: #d4d6dc; background: #fafbfc; }
    .item:active { transform: scale(.995); }

    .item .ic {
      flex: 0 0 auto;
      width: 44px; height: 44px;
      border-radius: 12px;
      background: #f3f4f6;
      color: var(--text);
      display: flex; align-items: center; justify-content: center;
    }
    .item .ic svg { width: 22px; height: 22px; }

    .item .body { flex: 1 1 auto; min-width: 0; }
    .item .t1 {
      display: block;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1.35;
    }
    .item .t2 {
      display: block;
      font-size: 13px;
      color: var(--text-2);
      font-weight: 500;
      margin-top: 3px;
      line-height: 1.4;
    }

    .item .chev {
      flex: 0 0 auto;
      color: var(--text-3);
      width: 20px;
      display: flex; align-items: center; justify-content: center;
    }

    /* Primary item (설치 버튼) */
    .item.primary {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
    }
    .item.primary:hover { background: #25a266; border-color: #25a266; }
    .item.primary .ic { background: rgba(255,255,255,.18); color: #fff; }
    .item.primary .t1 { color: #fff; }
    .item.primary .t2 { color: rgba(255,255,255,.85); }
    .item.primary .chev { color: rgba(255,255,255,.85); }

    /* 아이콘 색상 — 일반 카드 */
    .item.home .ic   { background: #eef2ff; color: #4f46e5; }
    .item.youtube .ic{ background: #fee2e2; color: #dc2626; }
    .item.live .ic   { background: #fef3c7; color: #d97706; position: relative; }
    .item.live .ic::after {
      content: ""; position: absolute; top: 8px; right: 8px;
      width: 6px; height: 6px; border-radius: 50%;
      background: #ef4444;
      box-shadow: 0 0 0 0 rgba(239,68,68,.6);
      animation: pulse 2s ease-out infinite;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(239,68,68,.6); }
      80%  { box-shadow: 0 0 0 8px rgba(239,68,68,0); }
      100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
    }

    /* 설치 완료 상태 */
    .item.primary.installed {
      background: var(--brand-dim);
      border-color: #c8ecd9;
      color: var(--brand);
    }
    .item.primary.installed .ic { background: var(--brand); color: #fff; }
    .item.primary.installed .t1 { color: #1f7a4f; }
    .item.primary.installed .t2 { color: #3b8e69; }
    .item.primary.installed .chev { color: var(--brand); }

    /* 로딩 상태 */
    .item.primary.loading { cursor: progress; }
    .item.primary.loading .chev { opacity: 0; }
    .item.primary.loading .spinner {
      position: absolute;
      right: 18px; top: 50%;
      width: 18px; height: 18px;
      margin-top: -9px;
      border: 2px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .item.primary .progress {
      position: absolute;
      left: 0; bottom: 0;
      height: 2px;
      width: 0;
      background: rgba(255,255,255,.7);
      transition: width .2s ease;
    }
    .item.primary.loading .progress { width: 100%; transition: width 2.4s ease; }

    /* Memory verse card */
    .verse {
      background: linear-gradient(180deg, #ffffff 0%, #f7faf8 100%);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 24px 22px 22px;
      margin-bottom: 14px;
      position: relative;
      overflow: hidden;
    }
    .verse::before {
      content: "";
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--brand);
      border-radius: 4px 0 0 4px;
    }
    /* 라벨 행: 왼쪽 라벨 + 오른쪽 "지난 암송 구절" 버튼 */
    .verse .label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }
    .verse .label {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      font-weight: 700;
      color: var(--brand);
      letter-spacing: 0.03em;
    }
    .verse .label::before {
      content: "";
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--brand);
    }
    /* "지난 암송 구절" 토글 버튼 (pill) */
    .past-toggle {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-2);
      background: #f3f4f6;
      border: 1px solid var(--line);
      border-radius: 50px;
      padding: 6px 13px;
      cursor: pointer;
      letter-spacing: -0.01em;
      transition: background .15s ease, border-color .15s ease, color .15s ease;
    }
    .past-toggle:hover { background: #ebedf0; border-color: #d4d6dc; color: var(--text); }
    .past-toggle:active { transform: scale(.97); }
    .past-toggle svg { width: 14px; height: 14px; transition: transform .2s ease; }
    .past-toggle.open { color: var(--brand); background: var(--brand-dim); border-color: #b8e8d0; }
    .past-toggle.open svg { transform: rotate(180deg); }
    .past-toggle.hidden { display: none; }
    .verse .text {
      font-size: 30px;
      line-height: 1.85;
      color: var(--text);
      font-weight: 600;
      letter-spacing: -0.01em;
      white-space: pre-wrap;
      word-break: keep-all;
      margin: 0;
    }
    .verse .ref {
      display: block;
      margin-top: 16px;
      font-size: 22px;
      color: var(--text-2);
      font-weight: 700;
      text-align: right;
    }
    .verse.loading .text,
    .verse.loading .ref { opacity: 0.45; }
    .verse.hidden { display: none; }

    /* 지난 암송 구절 리스트 패널 (verse 카드 위쪽에 표시) */
    .past-panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px 20px 8px;
      margin-bottom: 14px;
    }
    .past-panel.hidden { display: none; }
    .past-panel .past-head {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-2);
      letter-spacing: 0.02em;
      margin: 0 0 14px;
    }
    .past-list { display: flex; flex-direction: column; gap: 0; }
    .past-item {
      padding: 14px 0;
      border-top: 1px solid var(--line);
    }
    .past-item:first-child { border-top: none; padding-top: 0; }
    .past-item .past-range {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      color: var(--brand);
      background: var(--brand-dim);
      border-radius: 6px;
      padding: 3px 8px;
      margin-bottom: 8px;
      letter-spacing: 0;
    }
    .past-item .past-text {
      font-size: 16px;
      line-height: 1.7;
      color: var(--text);
      font-weight: 500;
      white-space: pre-wrap;
      word-break: keep-all;
      margin: 0;
    }
    .past-item .past-ref {
      display: block;
      margin-top: 8px;
      font-size: 13px;
      color: var(--text-2);
      font-weight: 700;
      text-align: right;
    }

    /* TTS 버튼 */
    .tts-row {
      margin-top: 18px;
      display: flex;
      justify-content: center;
    }
    .tts-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      color: var(--brand);
      background: var(--brand-dim);
      border: 1.5px solid #b8e8d0;
      border-radius: 50px;
      padding: 10px 22px;
      cursor: pointer;
      letter-spacing: -0.01em;
      transition: background .15s ease, border-color .15s ease, transform .08s ease;
    }
    .tts-btn:hover { background: #d4f0e4; border-color: #8fd6b2; }
    .tts-btn:active { transform: scale(.97); }
    .tts-btn.playing {
      color: #fff;
      background: var(--brand);
      border-color: var(--brand);
      animation: tts-pulse 2s ease-in-out infinite;
    }
    @keyframes tts-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(43,182,115,.4); }
      50%       { box-shadow: 0 0 0 8px rgba(43,182,115,0); }
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 28px;
      font-size: 12px;
      color: var(--text-3);
      font-weight: 500;
    }

    /* Toast */
    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(env(safe-area-inset-bottom) + 24px);
      transform: translateX(-50%) translateY(12px);
      background: var(--navy);
      color: #fff;
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.01em;
      box-shadow: 0 12px 30px -10px rgba(16,26,63,.4);
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease, transform .25s ease;
      z-index: 2147483647;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .item.live .ic::after { animation: none; }
      .item, .toast { transition: none; }
    }
  </style>
</head>
<body>

  <div class="wrap">

    <header class="header">
      <div class="logo">
        <img src="https://cdn.imweb.me/thumbnail/20260516/33c296729aee7.png" alt="Victory Church 로고">
      </div>
      <h1>뉴질랜드 빅토리처치</h1>
      <p>Victory Church · New Zealand</p>
    </header>

    <!-- 0-a. 지난 암송 구절 리스트 (토글로 열림) -->
    <section class="past-panel hidden" id="pastVerses" aria-live="polite">
      <p class="past-head">지난 암송 구절</p>
      <div class="past-list" id="pastList"></div>
    </section>

    <!-- 0. 이번 주 암송 구절 -->
    <section class="verse hidden" id="verseCard" aria-live="polite">
      <div class="label-row">
        <span class="label">이번 주 암송 구절</span>
        <button class="past-toggle hidden" id="pastToggle" type="button" aria-expanded="false">
          <span id="pastToggleLabel">지난 암송 구절</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
        </button>
      </div>
      <h1 class="text" id="verseText"></h1>
      <span class="ref" id="verseRef"></span>
      <div class="tts-row">
        <button class="tts-btn" id="ttsBtn" type="button">
          <svg id="ttsIcon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
          <span id="ttsBtnLabel">읽어주기</span>
        </button>
      </div>
    </section>

    <nav class="menu">

      <!-- 1. 바로가기 설치 -->
      <button class="item primary" id="btnInstall" type="button" data-a2hs>
        <span class="ic">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3v12"/>
            <path d="M7 10l5 5 5-5"/>
            <path d="M5 21h14"/>
          </svg>
        </span>
        <span class="body">
          <span class="t1">이 페이지 바로가기 만들기</span>
          <span class="t2">홈 화면에 추가하면 다음엔 한 번에 열려요</span>
        </span>
        <span class="chev">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
        </span>
        <span class="progress"></span>
      </button>

      <!-- 2. 홈페이지 -->
      <button class="item home" id="btnHome" type="button">
        <span class="ic">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 11l9-8 9 8"/>
            <path d="M5 10v10h14V10"/>
            <path d="M10 20v-6h4v6"/>
          </svg>
        </span>
        <span class="body">
          <span class="t1">교회 홈페이지</span>
          <span class="t2">victorychurch.nz</span>
        </span>
        <span class="chev">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
        </span>
      </button>

      <!-- 3. 유튜브 -->
      <button class="item youtube" id="btnYoutube" type="button">
        <span class="ic">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M21.6 7.2a2.5 2.5 0 0 0-1.8-1.8C18.2 5 12 5 12 5s-6.2 0-7.8.4A2.5 2.5 0 0 0 2.4 7.2C2 8.8 2 12 2 12s0 3.2.4 4.8a2.5 2.5 0 0 0 1.8 1.8C5.8 19 12 19 12 19s6.2 0 7.8-.4a2.5 2.5 0 0 0 1.8-1.8C22 15.2 22 12 22 12s0-3.2-.4-4.8zM10 15V9l5.2 3L10 15z"/>
          </svg>
        </span>
        <span class="body">
          <span class="t1">유튜브 채널</span>
          <span class="t2">설교 영상 보기 · @nzvictory</span>
        </span>
        <span class="chev">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
        </span>
      </button>

      <!-- 4. 라이브 -->
      <button class="item live" id="btnLive" type="button">
        <span class="ic">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M5.6 5.6a9 9 0 0 0 0 12.8M18.4 5.6a9 9 0 0 1 0 12.8"/>
            <path d="M8.5 8.5a5 5 0 0 0 0 7M15.5 8.5a5 5 0 0 1 0 7"/>
          </svg>
        </span>
        <span class="body">
          <span class="t1">실시간 라이브</span>
          <span class="t2">예배 함께 드리기</span>
        </span>
        <span class="chev">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
        </span>
      </button>

    </nav>

    <div class="footer">© Victory Church NZ</div>

  </div>

  <div class="toast" id="toast">바로가기 설치 완료</div>

  <script>
    // 외부 링크
    function openExternal(url) {
      window.open(url, '_blank', 'noopener,noreferrer');
    }
    document.getElementById('btnHome').addEventListener('click', function () {
      openExternal('https://victorychurch.nz/');
    });
    document.getElementById('btnYoutube').addEventListener('click', function () {
      openExternal('https://www.youtube.com/@nzvictory/videos');
    });
    document.getElementById('btnLive').addEventListener('click', function () {
      openExternal('https://www.youtube.com/@nzvictory/streams');
    });

    // 토스트
    var toastEl = document.getElementById('toast');
    var toastTimer = null;
    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function () { toastEl.classList.remove('show'); }, 2400);
    }

    // 설치 버튼 상태 관리
    var installBtn = document.getElementById('btnInstall');
    var installLoadingTimer = null;

    function setInstalled() {
      stopLoading();
      installBtn.classList.add('installed');
      installBtn.querySelector('.t1').textContent = '바로가기가 설치되어 있어요';
      installBtn.querySelector('.t2').textContent = '홈 화면 아이콘에서 바로 열어보세요';
    }
    function startLoading() {
      if (installBtn.classList.contains('installed')) return;
      installBtn.classList.add('loading');
      installBtn.setAttribute('aria-busy', 'true');
      // 로딩 중 스피너 노드 (없으면 추가)
      if (!installBtn.querySelector('.spinner')) {
        var s = document.createElement('span');
        s.className = 'spinner';
        installBtn.appendChild(s);
      }
    }
    function stopLoading() {
      installBtn.classList.remove('loading');
      installBtn.removeAttribute('aria-busy');
      var s = installBtn.querySelector('.spinner');
      if (s) s.remove();
      clearTimeout(installLoadingTimer);
      installLoadingTimer = null;
    }

    // 클릭 → 로딩 시작 (a2hs.js 핸들러보다 먼저)
    // 안전장치: 'appinstalled' 이벤트가 끝내 안 오면 30초 후 로딩만 해제
    // (안내 시트로 흐른 경우, 사용자가 수동 설치 중인 경우 등)
    installBtn.addEventListener('click', function () {
      if (installBtn.classList.contains('installed')) return;
      startLoading();
      installLoadingTimer = setTimeout(function () { stopLoading(); }, 30000);
    }, true);

    // 안내 시트 닫힘 감지 → 로딩 해제 (안내 시트로 분기된 경우)
    function observeSheet() {
      var sheet = document.querySelector('.a2hs-sheet');
      if (!sheet) { return setTimeout(observeSheet, 300); }
      var mo = new MutationObserver(function () {
        if (!sheet.classList.contains('show')) stopLoading();
      });
      mo.observe(sheet, { attributes: true, attributeFilter: ['class'] });
    }
    observeSheet();

    // ⭐ 진짜 설치 완료: 'appinstalled' 이벤트
    // OS가 PWA를 홈 화면/시작 메뉴에 실제로 설치한 직후 발생.
    // → 이때만 완료 표시 + 토스트
    window.addEventListener('appinstalled', function () {
      try { localStorage.setItem('a2hs_installed', '1'); } catch (e) {}
      setInstalled();
      showToast('바로가기 설치 완료');
    });

    // 네이티브 프롬프트 결과 처리
    // - accepted: 사용자가 "설치"를 눌렀을 뿐, 실제 완료는 아직 → 로딩 유지
    //   ('appinstalled' 이벤트가 곧 와서 완료 처리함)
    // - dismissed: 사용자가 거절 → 로딩 해제, 완료 표시 ❌
    window.addEventListener('a2hs:result', function (e) {
      if (!e.detail) return;
      if (e.detail.outcome === 'dismissed') {
        stopLoading();
      }
      // accepted 인 경우 일부러 아무것도 하지 않음 — appinstalled 대기
    });

    // standalone (이미 홈 화면 앱으로 열린 경우) — 조용히 완료 상태 표시
    function checkStandalone() {
      var standalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
                       || window.navigator.standalone === true;
      if (standalone && !installBtn.classList.contains('installed')) {
        try { localStorage.setItem('a2hs_installed', '1'); } catch (e) {}
        setInstalled();
      }
      return standalone;
    }
    checkStandalone();

    // display-mode 변경 감지 — 브라우저에서 PWA로 모드가 바뀌는 순간 잡힘
    if (window.matchMedia) {
      try {
        window.matchMedia('(display-mode: standalone)').addEventListener('change', function (e) {
          if (e.matches) checkStandalone();
        });
      } catch (err) {}
    }

    // 서비스워커
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch(function(){});
    }
  </script>

  <!-- 암송 구절: Firestore 실시간 구독 -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getFirestore, doc, onSnapshot }
      from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
    import { firebaseConfig, VERSE_DOC_PATH } from "./firebase-config.js";

    const card = document.getElementById('verseCard');
    const elText = document.getElementById('verseText');
    const elRef  = document.getElementById('verseRef');
    const pastPanel  = document.getElementById('pastVerses');
    const pastListEl = document.getElementById('pastList');
    const pastToggle = document.getElementById('pastToggle');
    const DEFAULT_VOICE = 'nPczCjzI2devNBz1zQrb'; // 기본값: Brian

    // 오늘 날짜(로컬, 뉴질랜드 기준)를 YYYY-MM-DD 문자열로
    function todayStr() {
      const d = new Date();
      const pad = (n) => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
    }

    // "2026-06-01" → "2026.06.01" / 범위 표시
    function fmtDate(s) { return (s || '').replace(/-/g, '.'); }
    function fmtRange(start, end) {
      if (start && end) return `${fmtDate(start)} ~ ${fmtDate(end)}`;
      if (start) return `${fmtDate(start)} ~`;
      if (end) return `~ ${fmtDate(end)}`;
      return '';
    }

    // 문서 데이터 → { active, past }
    // verses 배열이 있으면 날짜 기준으로 분류, 없고 레거시 text만 있으면 항상 활성으로 간주(하위호환)
    function classify(d) {
      const today = todayStr();
      let list = Array.isArray(d.verses) ? d.verses.slice() : [];
      if (list.length === 0 && (d.text || '').trim()) {
        // 레거시 단일 구절: 날짜 없음 → 항상 활성
        list = [{ text: d.text, reference: d.reference, voiceId: d.voiceId,
                  startDate: null, endDate: null }];
      }
      // 유효(본문 있음)한 항목만
      list = list.filter(v => v && (v.text || '').trim());

      // active: 시작일<=오늘<=종료일 (날짜 없으면 항상 활성). 여러 개면 startDate 최신 1개
      const actives = list.filter(v => {
        const okStart = !v.startDate || v.startDate <= today;
        const okEnd   = !v.endDate   || today <= v.endDate;
        return okStart && okEnd;
      });
      actives.sort((a, b) => (b.startDate || '').localeCompare(a.startDate || ''));
      const active = actives[0] || null;

      // past: 종료일이 오늘보다 과거. 종료일 내림차순
      const past = list
        .filter(v => v.endDate && v.endDate < today)
        .sort((a, b) => (b.endDate || '').localeCompare(a.endDate || ''));

      return { active, past };
    }

    function renderActive(active, sharedAudioUrl) {
      if (!active) {
        card.classList.add('hidden');
        try { localStorage.removeItem('verseCache'); } catch (e) {}
        return;
      }
      const text = (active.text || '').trim();
      const reference = (active.reference || '').trim();
      const voiceId = active.voiceId || DEFAULT_VOICE;
      const audioUrl = (sharedAudioUrl || '').trim() || null; // 공유 녹음(있으면 TTS 대신 재생)

      elText.textContent = text;
      elRef.textContent  = reference;
      card.classList.remove('hidden');

      // 전역 상태 업데이트 및 이벤트 트리거 (TTS 스크립트가 구독)
      window.currentTtsVoiceId = voiceId;
      window.currentVerseAudioUrl = audioUrl;
      try {
        window.dispatchEvent(new CustomEvent('vc:voicechange', { detail: { voiceId } }));
        window.dispatchEvent(new CustomEvent('vc:audiochange', { detail: { audioUrl } }));
      } catch (e) {}

      try {
        localStorage.setItem('verseCache', JSON.stringify({ text, reference, voiceId, audioUrl }));
      } catch (e) {}
    }

    function renderPast(past) {
      pastListEl.textContent = '';
      if (!past || past.length === 0) {
        pastToggle.classList.add('hidden');
        pastPanel.classList.add('hidden');
        pastToggle.classList.remove('open');
        pastToggle.setAttribute('aria-expanded', 'false');
        return;
      }
      past.forEach((v) => {
        const item = document.createElement('div');
        item.className = 'past-item';

        const range = fmtRange(v.startDate, v.endDate);
        if (range) {
          const r = document.createElement('span');
          r.className = 'past-range';
          r.textContent = range;
          item.appendChild(r);
        }
        const p = document.createElement('p');
        p.className = 'past-text';
        p.textContent = (v.text || '').trim();
        item.appendChild(p);

        const ref = (v.reference || '').trim();
        if (ref) {
          const rf = document.createElement('span');
          rf.className = 'past-ref';
          rf.textContent = ref;
          item.appendChild(rf);
        }
        pastListEl.appendChild(item);
      });
      pastToggle.classList.remove('hidden');
    }

    // 토글: 지난 구절 패널 열고 닫기
    pastToggle.addEventListener('click', function () {
      const willOpen = pastPanel.classList.contains('hidden');
      pastPanel.classList.toggle('hidden', !willOpen);
      pastToggle.classList.toggle('open', willOpen);
      pastToggle.setAttribute('aria-expanded', willOpen ? 'true' : 'false');
      if (willOpen) {
        pastPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });

    // 마지막으로 본 활성 구절 캐시 (오프라인 첫 화면용)
    try {
      const cached = JSON.parse(localStorage.getItem('verseCache') || 'null');
      if (cached && cached.text) {
        elText.textContent = cached.text;
        elRef.textContent  = cached.reference || '';
        if (cached.voiceId) window.lastCachedVoiceId = cached.voiceId;
        if (cached.audioUrl) window.lastCachedAudioUrl = cached.audioUrl;
        card.classList.remove('hidden');
      }
    } catch (e) {}

    try {
      const app = initializeApp(firebaseConfig);
      const db  = getFirestore(app);
      const ref = doc(db, VERSE_DOC_PATH.collection, VERSE_DOC_PATH.id);

      onSnapshot(ref, (snap) => {
        if (!snap.exists()) {
          renderActive(null);
          renderPast([]);
          return;
        }
        const d = snap.data() || {};
        const { active, past } = classify(d);
        renderActive(active, d.audioUrl);
        renderPast(past);
      }, (err) => {
        console.warn('[verse] snapshot error', err);
        // 오류 시 캐시가 없으면 숨김 유지
        if (!elText.textContent) card.classList.add('hidden');
      });
    } catch (e) {
      console.warn('[verse] init failed', e);
      // 초기화 실패 시 캐시가 없으면 숨김 유지
      if (!elText.textContent) card.classList.add('hidden');
    }
  </script>

  <!-- TTS (ElevenLabs) -->
  <script>
    (function () {
      const btn   = document.getElementById('ttsBtn');
      const label = document.getElementById('ttsBtnLabel');
      const icon  = document.getElementById('ttsIcon');
      if (!btn) return;

      /* ElevenLabs 설정 */
      const XI_KEY   = '0fb32fdf3fa82c68378bcf9a8e5de0a0acef05ceb7b0012c054b8ebbb0b831fe';
      const MODEL    = 'eleven_multilingual_v2';

      // Firestore에서 받아온 전역 설정 목소리 또는 캐시된 목소리 사용 (기본값: Brian)
      let VOICE_ID = window.currentTtsVoiceId || window.lastCachedVoiceId || 'nPczCjzI2devNBz1zQrb';

      // 관리자가 올린 녹음 파일 URL — 있으면 TTS 대신 이 녹음을 재생
      let recordingUrl = window.currentVerseAudioUrl || window.lastCachedAudioUrl || null;

      // 실시간으로 목사님 목소리 설정이 변경되는 이벤트를 구독
      window.addEventListener('vc:voicechange', function (e) {
        const newVoiceId = e.detail.voiceId;
        if (VOICE_ID !== newVoiceId) {
          VOICE_ID = newVoiceId;

          // 목소리가 변경되면 캐시를 무효화하고 재생 중인 소리를 멈춤
          if (cachedUrl) {
            URL.revokeObjectURL(cachedUrl);
            cachedUrl = null;
            cachedText = '';
          }
          if (active) {
            stopTTS();
          }
        }
      });

      // 녹음 파일 등록/삭제가 실시간 반영되면 소스를 교체 (재생 중이면 멈춤)
      window.addEventListener('vc:audiochange', function (e) {
        const newUrl = (e.detail && e.detail.audioUrl) || null;
        if (recordingUrl !== newUrl) {
          recordingUrl = newUrl;
          if (active) stopTTS();
        }
      });

      const ICON_PLAY = `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>`;
      const ICON_STOP = `<rect x="5" y="5" width="14" height="14" rx="2" fill="currentColor" stroke="none"/>`;

      let active     = false;
      let curAudio   = null;
      let cachedUrl  = null;
      let cachedText = '';

      /* Web Audio API를 활용한 교회/대성당 잔향(Reverb) 이펙터 설정 */
      let audioCtx   = null;
      let dryGain    = null;
      let wetGain    = null;
      let convolver  = null;

      /* 은은한 성경 낭독 분위기를 위한 배경 음악(BGM) 오디오 노드 및 상태 관리 */
      let bgmAudio    = null;
      let bgmSource   = null;
      let bgmVolume   = null;
      let playSessionId = 0;

      /* 중후한 목소리 보정을 위한 이퀄라이저(EQ) 필터 노드 */
      let voiceBassBoost = null;
      let voiceTrebleCut = null;

      function ensureAudioContext() {
        if (audioCtx) {
          if (audioCtx.state === 'suspended') {
            audioCtx.resume();
          }
          return;
        }

        try {
          const AudioContextClass = window.AudioContext || window.webkitAudioContext;
          if (!AudioContextClass) return;

          audioCtx = new AudioContextClass();
          if (audioCtx.state === 'suspended') {
            audioCtx.resume();
          }

          // 중후한 목소리 톤 보정용 필터 노드 생성 (EQ)
          voiceBassBoost = audioCtx.createBiquadFilter();
          voiceBassBoost.type = 'lowshelf';
          voiceBassBoost.frequency.value = 160; // 160Hz 이하의 풍부한 저음 부스트 (묵직한 가슴 공명음 강화)
          voiceBassBoost.gain.value = 5.0; // 5dB 증폭

          voiceTrebleCut = audioCtx.createBiquadFilter();
          voiceTrebleCut.type = 'highshelf';
          voiceTrebleCut.frequency.value = 4000; // 4kHz 이상의 날카로운 고음 감쇄 (시빌런스 및 미세 잡음 제어)
          voiceTrebleCut.gain.value = -3.5; // 3.5dB 감쇄

          // Direct 음성과 Reverb 음성 조절 Gain 노드 생성
          dryGain = audioCtx.createGain();
          wetGain = audioCtx.createGain();

          dryGain.gain.value = 0.85; // 본래 목소리는 명료하게 유지
          wetGain.gain.value = 0.28; // 목사님 설교단상 느낌의 웅장한 잔향감 부여 (28%)

          // 합성 임펄스 응답 생성 (성당/대형 강단 울림 시뮬레이션)
          const duration = 2.4; // 잔향 시간 2.4초
          const decay = 2.0;
          const sampleRate = audioCtx.sampleRate;
          const length = sampleRate * duration;
          const impulse = audioCtx.createBuffer(2, length, sampleRate);
          const left = impulse.getChannelData(0);
          const right = impulse.getChannelData(1);

          for (let i = 0; i < length; i++) {
            const percent = i / length;
            // 지수 감쇄하는 화이트 노이즈로 공간 울림 효과 구현
            const val = (Math.random() * 2 - 1) * Math.pow(1 - percent, decay);
            left[i] = val;
            right[i] = val;
          }

          convolver = audioCtx.createConvolver();
          convolver.buffer = impulse;

          // 연결 구조: source -> dryGain -> destination
          //           source -> convolver -> wetGain -> destination
          dryGain.connect(audioCtx.destination);
          convolver.connect(wetGain);
          wetGain.connect(audioCtx.destination);
        } catch (e) {
          console.warn('[WebAudio] Reverb initialization failed:', e);
        }
      }

      function initAudioContext(audioElement) {
        ensureAudioContext();
        if (!audioCtx) return;
        try {
          // HTMLMediaElement 소스 노드 생성 후 이펙터 체인에 연결
          const source = audioCtx.createMediaElementSource(audioElement);
          
          // 소스(낭독 음성) -> 저음 보스트 -> 고음 컷 -> 리버브/볼륨 노드로 연결
          source.connect(voiceBassBoost);
          voiceBassBoost.connect(voiceTrebleCut);

          voiceTrebleCut.connect(dryGain);
          voiceTrebleCut.connect(convolver);
        } catch (e) {
          console.warn('[WebAudio] Source connection failed:', e);
        }
      }

      /* 지정한 MP3 파일('bgm.mp3')을 재생하는 배경음악 함수 */
      function initBgmAudio() {
        if (bgmAudio) return;
        bgmAudio = new Audio('bgm.mp3');
        bgmAudio.crossOrigin = 'anonymous'; // CORS 차단 방지용 anonymous 설정
        bgmAudio.preload = 'auto'; // 리소스 사전 로드 강제
        bgmAudio.loop = true;
      }

      function startBgm() {
        ensureAudioContext();
        if (!audioCtx || !convolver) return;

        try {
          initBgmAudio();

          if (!bgmVolume) {
            bgmVolume = audioCtx.createGain();
            bgmVolume.gain.setValueAtTime(0.0, audioCtx.currentTime); // 초기 볼륨 0 설정으로 팝 노이즈 차단
            bgmVolume.connect(convolver); // 성당 잔향 연결
            bgmVolume.connect(audioCtx.destination);
          }

          if (!bgmSource) {
            bgmSource = audioCtx.createMediaElementSource(bgmAudio);
            bgmSource.connect(bgmVolume);
          }

          // 페이드인 처리 (노래가 잘 들리도록 35% 볼륨으로 설정)
          const now = audioCtx.currentTime;
          bgmVolume.gain.cancelScheduledValues(now);
          bgmVolume.gain.setValueAtTime(bgmVolume.gain.value === 1.0 ? 0.0 : bgmVolume.gain.value, now);
          bgmVolume.gain.linearRampToValueAtTime(0.35, now + 3.0); // 3초 페이드인

          // 브라우저 자동재생 제한 우회 처리를 보강하여 명시적으로 재생 실행
          if (audioCtx.state === 'suspended') {
            audioCtx.resume();
          }

          // 노래를 처음(0초)부터 재생

          bgmAudio.play().catch(e => {
            console.warn('BGM play failed, retrying on window click:', e);
            // 사용자 제스처가 간혹 분실되었을 때를 대비한 백업 핸들러 등록
            const retryPlay = () => {
              bgmAudio.play().then(() => {
                window.removeEventListener('click', retryPlay);
              }).catch(err => console.warn('BGM retry failed:', err));
            };
            window.addEventListener('click', retryPlay);
          });
        } catch (e) {
          console.warn('[BGM] Failed to play background audio file:', e);
        }
      }

      function stopBgm() {
        const now = audioCtx ? audioCtx.currentTime : 0;
        if (bgmVolume && audioCtx) {
          bgmVolume.gain.cancelScheduledValues(now);
          bgmVolume.gain.setValueAtTime(bgmVolume.gain.value, now);
          bgmVolume.gain.linearRampToValueAtTime(0.0, now + 1.5); // 1.5초 페이드아웃
        }
        setTimeout(() => {
          if (!active && bgmAudio) {
            bgmAudio.pause();
            bgmAudio.currentTime = 0; // 정지 후 다시 처음(0초)부터 재생되도록 되감기
          }
        }, 1600);
      }

      function getFullText() {
        const text = (document.getElementById('verseText').textContent || '').trim();
        const ref  = (document.getElementById('verseRef').textContent  || '').trim();
        return text + (ref ? '\n\n' + ref : '');
      }

      /* ElevenLabs API 호출 (목사님 톤 튜닝 적용) */
      async function fetchSpeech(text) {
        const res = await fetch(
          `https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}`,
          {
            method: 'POST',
            headers: {
              'Accept': 'audio/mpeg',
              'Content-Type': 'application/json',
              'xi-api-key': XI_KEY
            },
            body: JSON.stringify({
              text,
              model_id: MODEL,
              voice_settings: {
                stability: 0.78,          // 안정성 높임 (중후하고 신뢰감 있는 억양 유지)
                similarity_boost: 0.85,   // 선명도 높임
                style: 0.0,               // 감정 기복을 최소화하여 정중하고 경건하게 낭독
                use_speaker_boost: true   // 기본 음질 강화 활성화
              }
            })
          }
        );
        if (!res.ok) throw new Error('ElevenLabs ' + res.status);
        return res.blob();
      }

      /* 관리자가 올린 녹음 파일 재생 (TTS 대체) — Web Audio 체인을 거치지 않고
         일반 오디오 엘리먼트로 직접 재생: 교차출처(CORS) 무음 문제를 피하고
         사람이 녹음한 목소리를 리버브 없이 자연스럽게 들려준다. 배경음악은 그대로 깔린다. */
      function playRecording(sessionId, startTime = null) {
        if (!active || sessionId !== playSessionId || !recordingUrl) return;

        label.textContent = '불러오는 중...';
        curAudio = new Audio(recordingUrl);
        curAudio.preload = 'auto';

        curAudio.onended = function () {
          if (active && sessionId === playSessionId) {
            label.textContent = '멈추기';
            // 완독 후 3.0초 음악만 흐른 뒤 반복 (outro cushion)
            setTimeout(() => {
              if (active && sessionId === playSessionId) play(sessionId);
            }, 3000);
          }
        };
        curAudio.onerror = function () {
          if (active && sessionId === playSessionId) {
            setTimeout(() => {
              if (active && sessionId === playSessionId) play(sessionId);
            }, 3000);
          }
        };

        const startPlayback = () => {
          if (!active || sessionId !== playSessionId) return;
          label.textContent = '멈추기';
          curAudio.play().catch(e => console.warn('[REC] 녹음 재생 실패:', e));
        };

        // 첫 시작일 때만 인트로 딜레이 5초 (배경음악이 먼저 잔잔히 깔리도록)
        if (startTime) {
          const elapsed = Date.now() - startTime;
          const delay = Math.max(0, 5000 - elapsed);
          label.textContent = '멈추기';
          setTimeout(startPlayback, delay);
        } else {
          startPlayback();
        }
      }

      /* 재생 (캐시 확인 후 API 호출 또는 폴백) */
      async function play(sessionId, startTime = null) {
        if (!active || sessionId !== playSessionId) return;

        // 녹음 파일이 등록되어 있으면 TTS 대신 녹음을 재생
        if (recordingUrl) {
          playRecording(sessionId, startTime);
          return;
        }

        const text = getFullText();
        if (!text) return;

        label.textContent = '불러오는 중...';

        try {
          // 같은 구절이면 캐시 사용 (API 호출 절약)
          if (text !== cachedText || !cachedUrl) {
            const blob = await fetchSpeech(text);
            if (!active || sessionId !== playSessionId) return;
            if (cachedUrl) URL.revokeObjectURL(cachedUrl);
            cachedUrl  = URL.createObjectURL(blob);
            cachedText = text;
          }
          if (!active || sessionId !== playSessionId) return;

          curAudio = new Audio(cachedUrl);
          
          // 재생 전 Web Audio API 공간계 이펙터 연결
          initAudioContext(curAudio);

          curAudio.onended = function () {
            if (active && sessionId === playSessionId) {
              label.textContent = '멈추기';
              // 완독 후 3.0초 동안 음악만 나오게 대기 후 다음 반복 시작 (outro cushion)
              setTimeout(() => {
                if (active && sessionId === playSessionId) {
                  play(sessionId);
                }
              }, 3000);
            }
          };
          curAudio.onerror = function () {
            if (active && sessionId === playSessionId) {
              setTimeout(() => {
                if (active && sessionId === playSessionId) {
                  play(sessionId);
                }
              }, 3000);
            }
          };

          // 첫 시작(startTime이 전달됨)일 때만 인트로 딜레이 5초 보장
          if (startTime) {
            const elapsed = Date.now() - startTime;
            const delay = Math.max(0, 5000 - elapsed);
            label.textContent = '멈추기';
            setTimeout(() => {
              if (active && sessionId === playSessionId) {
                curAudio.play();
              }
            }, delay);
          } else {
            label.textContent = '멈추기';
            curAudio.play();
          }

        } catch (e) {
          console.warn('[TTS] ElevenLabs 실패, 기본 음성으로 전환:', e);
          label.textContent = '멈추기';
          
          // 첫 시작일 때 인트로 딜레이 후 fallback 실행
          if (startTime) {
            const elapsed = Date.now() - startTime;
            const delay = Math.max(0, 5000 - elapsed);
            setTimeout(() => {
              if (active && sessionId === playSessionId) {
                fallback(text, sessionId);
              }
            }, delay);
          } else {
            fallback(text, sessionId);
          }
        }
      }

      /* Web Speech API 폴백 (브라우저 기본 남성 목소리 우선 매칭) */
      function fallback(text, sessionId) {
        if (!window.speechSynthesis || !active || sessionId !== playSessionId) return;
        const utt = new SpeechSynthesisUtterance(text);
        utt.lang  = 'ko-KR';
        utt.rate  = 0.92;
        utt.pitch = 0.78; // 기본 음성도 더욱 중후하고 엄숙하게 목소리 톤 다운
        
        const voices = window.speechSynthesis.getVoices();
        const koVoices = voices.filter(v => v.lang.startsWith('ko'));
        
        // 브라우저 기본 한국어 목소리 중 남성(Injoon, Kangkang 등) 우선 검색, 없으면 첫 번째 한국어 목소리 사용
        const maleVoice = koVoices.find(v => /male|남성|남자|injoon|kangkang/i.test(v.name));
        const v = maleVoice || koVoices[0];
        
        if (v) utt.voice = v;
        utt.onend = () => {
          if (active && sessionId === playSessionId) {
            // 완독 후 3.0초 쉬고 반복 (배경음악 3초 단독 재생)
            setTimeout(() => {
              if (active && sessionId === playSessionId) {
                fallback(text, sessionId);
              }
            }, 3000);
          }
        };
        window.speechSynthesis.speak(utt);
      }

      /* 시작 / 멈춤 */
      function startTTS() {
        active = true;
        playSessionId++;
        const currentSessionId = playSessionId;

        btn.classList.add('playing');
        label.textContent = '불러오는 중...';
        icon.innerHTML = ICON_STOP;
        
        // 클릭 시 사용자 제스처 이벤트 내에서 AudioContext 활성화 보장 및 BGM 켜기
        ensureAudioContext();
        startBgm();
        
        const startTime = Date.now();
        play(currentSessionId, startTime);
      }

      function stopTTS() {
        active = false;
        playSessionId++; // 세션 ID 증가시켜 대기 중인 모든 setTimeout 동작 무효화
        if (curAudio) { curAudio.pause(); curAudio = null; }
        if (window.speechSynthesis) window.speechSynthesis.cancel();
        stopBgm();
        btn.classList.remove('playing');
        label.textContent = '읽어주기';
        icon.innerHTML = ICON_PLAY;
      }

      btn.addEventListener('click', function () {
        if (active) stopTTS(); else startTTS();
      });

      // 화면 숨김 시 자동 중지
      document.addEventListener('visibilitychange', function () {
        if (document.hidden && active) stopTTS();
      });
    })();
  </script>

</body>
