  <style>
    :root {
      --bg:       #ffffff;
      --surface:  #ffffff;
      --line:     #e9eaee;
      --text:     #363636;     /* ?먮낯 蹂몃Ц??*/
      --text-2:   #6b7280;
      --text-3:   #9ca3af;
      --brand:    #2bb673;     /* ?먮낯 誘쇳듃洹몃┛ */
      --brand-dim:#e7f6ef;
      --navy:     #101a3f;     /* 濡쒓퀬 ?ㅼ씠鍮?*/
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont,
                   'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100%;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-feature-settings: "ss06", "ss07";
      letter-spacing: -0.01em;
    }

    .wrap {
      max-width: 480px;
      margin: 0 auto;
      padding:
        calc(env(safe-area-inset-top) + 32px)
        20px
        calc(env(safe-area-inset-bottom) + 24px);
    }

    /* Header */
    .header {
      text-align: center;
      padding-bottom: 28px;
    }
    .logo {
      width: 96px;
      margin: 0 auto 16px;
    }
    .logo img {
      width: 100%;
      height: auto;
      display: block;
      image-rendering: -webkit-optimize-contrast;
    }
    .header h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--navy);
      margin: 0 0 6px;
      letter-spacing: -0.02em;
    }
    .header p {
      font-size: 14px;
      color: var(--text-2);
      margin: 0;
      font-weight: 500;
    }

    /* Menu */
    .menu {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .item {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color .15s ease, background .15s ease, transform .08s ease;
      position: relative;
      overflow: hidden;
    }
    .item:hover { border-color: #d4d6dc; background: #fafbfc; }
    .item:active { transform: scale(.995); }

    .item .ic {
      flex: 0 0 auto;
      width: 44px; height: 44px;
      border-radius: 12px;
      background: #f3f4f6;
      color: var(--text);
      display: flex; align-items: center; justify-content: center;
    }
    .item .ic svg { width: 22px; height: 22px; }

    .item .body { flex: 1 1 auto; min-width: 0; }
    .item .t1 {
      display: block;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1.35;
    }
    .item .t2 {
      display: block;
      font-size: 13px;
      color: var(--text-2);
      font-weight: 500;
      margin-top: 3px;
      line-height: 1.4;
    }

    .item .chev {
      flex: 0 0 auto;
      color: var(--text-3);
      width: 20px;
      display: flex; align-items: center; justify-content: center;
    }

    /* Primary item (?ㅼ튂 踰꾪듉) */
    .item.primary {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
    }
    .item.primary:hover { background: #25a266; border-color: #25a266; }
    .item.primary .ic { background: rgba(255,255,255,.18); color: #fff; }
    .item.primary .t1 { color: #fff; }
    .item.primary .t2 { color: rgba(255,255,255,.85); }
    .item.primary .chev { color: rgba(255,255,255,.85); }

    /* ?꾩씠肄??됱긽 ???쇰컲 移대뱶 */
    .item.home .ic   { background: #eef2ff; color: #4f46e5; }
    .item.youtube .ic{ background: #fee2e2; color: #dc2626; }
    .item.live .ic   { background: #fef3c7; color: #d97706; position: relative; }
    .item.live .ic::after {
      content: ""; position: absolute; top: 8px; right: 8px;
      width: 6px; height: 6px; border-radius: 50%;
      background: #ef4444;
      box-shadow: 0 0 0 0 rgba(239,68,68,.6);
      animation: pulse 2s ease-out infinite;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(239,68,68,.6); }
      80%  { box-shadow: 0 0 0 8px rgba(239,68,68,0); }
      100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }

    /* ?ㅼ튂 ?꾨즺 ?곹깭 */
    .item.primary.installed {

      color: var(--brand);

    .item.primary.installed .t2 { color: #3b8e69; }
    .item.primary.installed .chev { color: var(--brand); }

    /* 濡쒕뵫 ?곹깭 */
    .item.primary.loading { cursor: progress; }
    .item.primary.loading .chev { opacity: 0; }
    .item.primary.loading .spinner {
      position: absolute;
      right: 18px; top: 50%;
      width: 18px; height: 18px;
      margin-top: -9px;
      border: 2px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .item.primary .progress {
      position: absolute;
      left: 0; bottom: 0;
      height: 2px;
      width: 0;
      background: rgba(255,255,255,.7);
      transition: width .2s ease;
    }
    .item.primary.loading .progress { width: 100%; transition: width 2.4s ease; }

    /* Memory verse card */
    .verse {
      background: linear-gradient(180deg, #ffffff 0%, #f7faf8 100%);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 24px 22px 22px;
      margin-bottom: 14px;
      position: relative;
      overflow: hidden;
    }
    .verse::before {
      content: "";
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--brand);
      border-radius: 4px 0 0 4px;
    }
    .verse .label {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      font-weight: 700;
      color: var(--brand);
      letter-spacing: 0.03em;

    .verse .label::before {
      content: "";
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--brand);
    }
    .verse .text {
      font-size: 30px;
      line-height: 1.85;
      color: var(--text);
      font-weight: 600;
      letter-spacing: -0.01em;
      white-space: pre-wrap;
      word-break: keep-all;
      margin: 0;
    }
    .verse .ref {
      display: block;
      margin-top: 16px;
      font-size: 22px;
      color: var(--text-2);
      font-weight: 700;
      text-align: right;
    }
    .verse.loading .text,
    .verse.loading .ref { opacity: 0.45; }
    .verse.hidden { display: none; }

    /* TTS 踰꾪듉 */
    .tts-row {
      margin-top: 18px;
      display: flex;
      justify-content: center;
    }
    .tts-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      color: var(--brand);
      background: var(--brand-dim);
      border: 1.5px solid #b8e8d0;
      border-radius: 50px;
      padding: 10px 22px;
      cursor: pointer;
      letter-spacing: -0.01em;
      transition: background .15s ease, border-color .15s ease, transform .08s ease;
    }
    .tts-btn:hover { background: #d4f0e4; border-color: #8fd6b2; }
    .tts-btn:active { transform: scale(.97); }
    .tts-btn.playing {
      color: #fff;
      background: var(--brand);
      border-color: var(--brand);
      animation: tts-pulse 2s ease-in-out infinite;

    @keyframes tts-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(43,182,115,.4); }
      50%       { box-shadow: 0 0 0 8px rgba(43,182,115,0); }
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 28px;
      font-size: 12px;
      color: var(--text-3);
      font-weight: 500;
    }

    /* Toast */
    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(env(safe-area-inset-bottom) + 24px);
      transform: translateX(-50%) translateY(12px);
      background: var(--navy);
      color: #fff;
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.01em;
      box-shadow: 0 12px 30px -10px rgba(16,26,63,.4);
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease, transform .25s ease;
      z-index: 2147483647;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .item.live .ic::after { animation: none; }
      .item, .toast { transition: none; }
    }
  </style>
</head>

  <script>
    // ?몃? 留곹겕
    function openExternal(url) {
      window.open(url, '_blank', 'noopener,noreferrer');
    }
    document.getElementById('btnHome').addEventListener('click', function () {
      openExternal('https://victorychurch.nz/');
    });
    document.getElementById('btnYoutube').addEventListener('click', function () {
      openExternal('https://www.youtube.com/@nzvictory/videos');
    });
    document.getElementById('btnLive').addEventListener('click', function () {
      openExternal('https://www.youtube.com/@nzvictory/streams');
    });

    // ?좎뒪??    var toastEl = document.getElementById('toast');
    var toastTimer = null;
    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function () { toastEl.classList.remove('show'); }, 2400);
    }

    // ?ㅼ튂 踰꾪듉 ?곹깭 愿由?    var installBtn = document.getElementById('btnInstall');
    var installLoadingTimer = null;

    function setInstalled() {
      stopLoading();
      installBtn.classList.add('installed');
      installBtn.querySelector('.t1').textContent = '諛붾줈媛湲곌? ?ㅼ튂?섏뼱 ?덉뼱??;
      installBtn.querySelector('.t2').textContent = '???붾㈃ ?꾩씠肄섏뿉??諛붾줈 ?댁뼱蹂댁꽭??;
    }
    function startLoading() {
      if (installBtn.classList.contains('installed')) return;
      installBtn.classList.add('loading');
      installBtn.setAttribute('aria-busy', 'true');
      // 濡쒕뵫 以??ㅽ뵾???몃뱶 (?놁쑝硫?異붽?)
      if (!installBtn.querySelector('.spinner')) {
        var s = document.createElement('span');
        s.className = 'spinner';
        installBtn.appendChild(s);
      }
    }
    function stopLoading() {
      installBtn.classList.remove('loading');
      installBtn.removeAttribute('aria-busy');
      var s = installBtn.querySelector('.spinner');
      if (s) s.remove();
      clearTimeout(installLoadingTimer);
      installLoadingTimer = null;
    }

    // ?대┃ ??濡쒕뵫 ?쒖옉 (a2hs.js ?몃뱾?щ낫??癒쇱?)
    // ?덉쟾?μ튂: 'appinstalled' ?대깽?멸? ?앸궡 ???ㅻ㈃ 30珥???濡쒕뵫留??댁젣
    // (?덈궡 ?쒗듃濡??먮Ⅸ 寃쎌슦, ?ъ슜?먭? ?섎룞 ?ㅼ튂 以묒씤 寃쎌슦 ??
    installBtn.addEventListener('click', function () {
      if (installBtn.classList.contains('installed')) return;
      startLoading();
      installLoadingTimer = setTimeout(function () { stopLoading(); }, 30000);
    }, true);

    // ?덈궡 ?쒗듃 ?ロ옒 媛먯? ??濡쒕뵫 ?댁젣 (?덈궡 ?쒗듃濡?遺꾧린??寃쎌슦)
    function observeSheet() {
      var sheet = document.querySelector('.a2hs-sheet');
      if (!sheet) { return setTimeout(observeSheet, 300); }
      var mo = new MutationObserver(function () {
        if (!sheet.classList.contains('show')) stopLoading();
      });
      mo.observe(sheet, { attributes: true, attributeFilter: ['class'] });
    }
    observeSheet();

    // 狩?吏꾩쭨 ?ㅼ튂 ?꾨즺: 'appinstalled' ?대깽??    // OS媛 PWA瑜????붾㈃/?쒖옉 硫붾돱???ㅼ젣濡??ㅼ튂??吏곹썑 諛쒖깮.
    // ???대븣留??꾨즺 ?쒖떆 + ?좎뒪??    window.addEventListener('appinstalled', function () {
      try { localStorage.setItem('a2hs_installed', '1'); } catch (e) {}
      setInstalled();
      showToast('諛붾줈媛湲??ㅼ튂 ?꾨즺');
    });

    // ?ㅼ씠?곕툕 ?꾨＼?꾪듃 寃곌낵 泥섎━
    // - accepted: ?ъ슜?먭? "?ㅼ튂"瑜??뚮???肉? ?ㅼ젣 ?꾨즺???꾩쭅 ??濡쒕뵫 ?좎?
    //   ('appinstalled' ?대깽?멸? 怨?????꾨즺 泥섎━??
    // - dismissed: ?ъ슜?먭? 嫄곗젅 ??濡쒕뵫 ?댁젣, ?꾨즺 ?쒖떆 ??    window.addEventListener('a2hs:result', function (e) {
      if (!e.detail) return;
      if (e.detail.outcome === 'dismissed') {
        stopLoading();
      }
      // accepted ??寃쎌슦 ?쇰????꾨Т寃껊룄 ?섏? ?딆쓬 ??appinstalled ?湲?    });

    // standalone (?대? ???붾㈃ ?깆쑝濡??대┛ 寃쎌슦) ??議곗슜???꾨즺 ?곹깭 ?쒖떆
    function checkStandalone() {
      var standalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
                       || window.navigator.standalone === true;
      if (standalone && !installBtn.classList.contains('installed')) {
        try { localStorage.setItem('a2hs_installed', '1'); } catch (e) {}
        setInstalled();
      }
      return standalone;
    }
    checkStandalone();

    // display-mode 蹂寃?媛먯? ??釉뚮씪?곗??먯꽌 PWA濡?紐⑤뱶媛 諛붾뚮뒗 ?쒓컙 ?≫옒
    if (window.matchMedia) {
      try {
        window.matchMedia('(display-mode: standalone)').addEventListener('change', function (e) {
          if (e.matches) checkStandalone();
        });
      } catch (err) {}
    }

    // ?쒕퉬?ㅼ썙而?    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch(function(){});
    }
  </script>

  <!-- ?붿넚 援ъ젅: Firestore ?ㅼ떆媛?援щ룆 -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getFirestore, doc, onSnapshot }
      from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
    import { firebaseConfig, VERSE_DOC_PATH } from "./firebase-config.js";

    const card = document.getElementById('verseCard');
    const elText = document.getElementById('verseText');
    const elRef  = document.getElementById('verseRef');

    // 留덉?留됱쑝濡?蹂?媛?罹먯떆 (?ㅽ봽?쇱씤 泥??붾㈃??
    try {
      const cached = JSON.parse(localStorage.getItem('verseCache') || 'null');
      if (cached && cached.text) {
        elText.textContent = cached.text;
        elRef.textContent  = cached.reference || '';
        card.classList.remove('hidden');
      }
    } catch (e) {}

    try {
      const app = initializeApp(firebaseConfig);
      const db  = getFirestore(app);
      const ref = doc(db, VERSE_DOC_PATH.collection, VERSE_DOC_PATH.id);

      onSnapshot(ref, (snap) => {
        if (!snap.exists()) {
          // ?곗씠???놁쓬 ??移대뱶 ?④?
          card.classList.add('hidden');
          try { localStorage.removeItem('verseCache'); } catch (e) {}
          return;
        }
        const d = snap.data() || {};
        const text = (d.text || '').trim();
        const reference = (d.reference || '').trim();
        if (!text) {
          // ?띿뒪?멸? 鍮꾩뼱 ?덉쑝硫??④?
          card.classList.add('hidden');
          try { localStorage.removeItem('verseCache'); } catch (e) {}
          return;
        }
        elText.textContent = text;
        elRef.textContent  = reference;
        card.classList.remove('hidden');
        try { localStorage.setItem('verseCache', JSON.stringify({ text, reference })); } catch (e) {}
      }, (err) => {
        console.warn('[verse] snapshot error', err);
        // ?ㅻ쪟 ??罹먯떆媛 ?놁쑝硫??④? ?좎?
        if (!elText.textContent) {
          card.classList.add('hidden');
        }
      });
    } catch (e) {
      console.warn('[verse] init failed', e);
      // 珥덇린???ㅽ뙣 ??罹먯떆媛 ?놁쑝硫??④? ?좎?
      if (!elText.textContent) {
        card.classList.add('hidden');
      }
    }
  </script>

  <script src="a2hs.js" defer

  <!-- TTS (ElevenLabs) -->
  <script>
    (function () {
      const btn   = document.getElementById('ttsBtn');
      const label = document.getElementById('ttsBtnLabel');
      const icon  = document.getElementById('ttsIcon');
      if (!btn) return;

      /* ?? ElevenLabs ?ㅼ젙 ?? */
      const XI_KEY   = '0fb32fdf3fa82c68378bcf9a8e5de0a0acef05ceb7b0012c054b8ebbb0b831fe';
      const VOICE_ID = 'pNInz6obpgDQGcFmaJgB'; // Adam ??multilingual ?⑥꽦 (?쒓뎅??理쒖쟻)
      const MODEL    = 'eleven_multilingual_v2';

      const ICON_PLAY = `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>`;
      const ICON_STOP = `<rect x="5" y="5" width="14" height="14" rx="2" fill="currentColor" stroke="none"/>`;

      let active     = false;
      let curAudio   = null;
      let cachedUrl  = null;
      let cachedText = '';

      function getFullText() {
        const text = (document.getElementById('verseText').textContent || '').trim();
        const ref  = (document.getElementById('verseRef').textContent  || '').trim();
        return text + (ref ? '\n\n' + ref : '');
      }

      /* ?? ElevenLabs API ?몄텧 ?? */
      async function fetchSpeech(text) {
        const res = await fetch(
          `https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}`,
          {
            method: 'POST',
            headers: {
              'Accept': 'audio/mpeg',
              'Content-Type': 'application/json',
              'xi-api-key': XI_KEY
            },
            body: JSON.stringify({
              text,
              model_id: MODEL,
              voice_settings: {
                stability: 0.68,          // ?쒗쁽????                similarity_boost: 0.88,   // 紐⑹냼由??좊챸??                style: 0.32,              // ?먯뿰?ㅻ윭???듭뼇
                use_speaker_boost: true   // ?뚯쭏 媛뺥솕
              }
            })
          }
        );
        if (!res.ok) throw new Error('ElevenLabs ' + res.status);
        return res.blob();
      }

      /* ?? ?ъ깮 (罹먯떆 ??API ???대갚 ?쒖꽌) ?? */
      async function play() {
        if (!active) return;

        const text = getFullText();
        if (!text) return;

        label.textContent = '遺덈윭?ㅻ뒗 以묅?;

        try {
          // 媛숈? 援ъ젅?대㈃ ?ъ궗??(API ?덉빟)
          if (text !== cachedText || !cachedUrl) {
            const blob = await fetchSpeech(text);
            if (!active) return;
            if (cachedUrl) URL.revokeObjectURL(cachedUrl);
            cachedUrl  = URL.createObjectURL(blob);
            cachedText = text;
          }
          if (!active) return;

          curAudio = new Audio(cachedUrl);
          curAudio.onended = function () {
            if (active) {
              label.textContent = '硫덉텛湲?;
              setTimeout(play, 2500); // ?꾨룆 ??2.5珥??ш퀬 諛섎났
            }
          };
          curAudio.onerror = function () {
            if (active) setTimeout(play, 3000);
          };
          label.textContent = '硫덉텛湲?;
          curAudio.play();

        } catch (e) {
          console.warn('[TTS] ElevenLabs ?ㅽ뙣, 湲곕낯 ?뚯꽦?쇰줈 ?꾪솚:', e);
          label.textContent = '硫덉텛湲?;
          fallback(text);
        }
      }

      /* ?? Web Speech API ?대갚 ?? */
      function fallback(text) {
        if (!window.speechSynthesis || !active) return;
        const utt = new SpeechSynthesisUtterance(text);
        utt.lang  = 'ko-KR';
        utt.rate  = 0.92;
        utt.pitch = 0.88;
        const voices = window.speechSynthesis.getVoices();
        const v = voices.find(v => v.lang.startsWith('ko'));
        if (v) utt.voice = v;
        utt.onend = () => { if (active) setTimeout(() => fallback(text), 2000); };
        window.speechSynthesis.speak(utt);
      }

      /* ?? ?쒖옉 / 硫덉땄 ?? */
      function startTTS() {
        active = true;
        btn.classList.add('playing');
        label.textContent = '遺덈윭?ㅻ뒗 以묅?;
        icon.innerHTML = ICON_STOP;
        play();
      }

      function stopTTS() {
        active = false;
        if (curAudio) { curAudio.pause(); curAudio = null; }
        if (window.speechSynthesis) window.speechSynthesis.cancel();
        btn.classList.remove('playing');
        label.textContent = '?쎌뼱二쇨린';
        icon.innerHTML = ICON_PLAY;
      }

      btn.addEventListener('click', function () {
        if (active) stopTTS(); else startTTS();
      });

      // ?붾㈃ ?④? ???먮룞 以묒?
      document.addEventListener('visibilitychange', function () {
        if (document.hidden && active) stopTTS();
      });
    })();
  </script>
