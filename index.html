<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Victory Church — 뉴질랜드 빅토리처치</title>

  <link rel="manifest" href="manifest.webmanifest?v=2">
  <meta name="theme-color" content="#ffffff">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png?v=2">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png?v=2">
  <link rel="apple-touch-icon" href="icon-192.png?v=2">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-192.png?v=2">
  <meta name="apple-mobile-web-app-title" content="Victory Church">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <!-- Pretendard (원본 사이트와 동일) -->
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">

  <style>
    :root {
      --bg:       #ffffff;
      --surface:  #ffffff;
      --line:     #e9eaee;
      --text:     #363636;     /* 원본 본문색 */
      --text-2:   #6b7280;
      --text-3:   #9ca3af;
      --brand:    #2bb673;     /* 원본 민트그린 */
      --brand-dim:#e7f6ef;
      --navy:     #101a3f;     /* 로고 네이비 */
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont,
                   'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100%;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-feature-settings: "ss06", "ss07";
      letter-spacing: -0.01em;
    }

    .wrap {
      max-width: 480px;
      margin: 0 auto;
      padding:
        calc(env(safe-area-inset-top) + 32px)
        20px
        calc(env(safe-area-inset-bottom) + 24px);
    }

    /* Header */
    .header {
      text-align: center;
      padding-bottom: 28px;
    }
    .logo {
      width: 96px;
      margin: 0 auto 16px;
    }
    .logo img {
      width: 100%;
      height: auto;
      display: block;
      image-rendering: -webkit-optimize-contrast;
    }
    .header h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--navy);
      margin: 0 0 6px;
      letter-spacing: -0.02em;
    }
    .header p {
      font-size: 14px;
      color: var(--text-2);
      margin: 0;
      font-weight: 500;
    }

    /* Menu */
    .menu {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .item {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color .15s ease, background .15s ease, transform .08s ease;
      position: relative;
      overflow: hidden;
    }
    .item:hover { border-color: #d4d6dc; background: #fafbfc; }
    .item:active { transform: scale(.995); }

    .item .ic {
      flex: 0 0 auto;
      width: 44px; height: 44px;
      border-radius: 12px;
      background: #f3f4f6;
      color: var(--text);
      display: flex; align-items: center; justify-content: center;
    }
    .item .ic svg { width: 22px; height: 22px; }

    .item .body { flex: 1 1 auto; min-width: 0; }
    .item .t1 {
      display: block;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1.35;
    }
    .item .t2 {
      display: block;
      font-size: 13px;
      color: var(--text-2);
      font-weight: 500;
      margin-top: 3px;
      line-height: 1.4;
    }

    .item .chev {
      flex: 0 0 auto;
      color: var(--text-3);
      width: 20px;
      display: flex; align-items: center; justify-content: center;
    }

    /* Primary item (설치 버튼) */
    .item.primary {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
    }
    .item.primary:hover { background: #25a266; border-color: #25a266; }
    .item.primary .ic { background: rgba(255,255,255,.18); color: #fff; }
    .item.primary .t1 { color: #fff; }
    .item.primary .t2 { color: rgba(255,255,255,.85); }
    .item.primary .chev { color: rgba(255,255,255,.85); }

    /* 아이콘 색상 — 일반 카드 */
    .item.home .ic   { background: #eef2ff; color: #4f46e5; }
    .item.youtube .ic{ background: #fee2e2; color: #dc2626; }
    .item.live .ic   { background: #fef3c7; color: #d97706; position: relative; }
    .item.live .ic::after {
      content: ""; position: absolute; top: 8px; right: 8px;
      width: 6px; height: 6px; border-radius: 50%;
      background: #ef4444;
      box-shadow: 0 0 0 0 rgba(239,68,68,.6);
      animation: pulse 2s ease-out infinite;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(239,68,68,.6); }
      80%  { box-shadow: 0 0 0 8px rgba(239,68,68,0); }
      100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
    }

    /* 설치 완료 상태 */
    .item.primary.installed {
      background: var(--brand-dim);
      border-color: #c8ecd9;
      color: var(--brand);
    }
    .item.primary.installed .ic { background: var(--brand); color: #fff; }
    .item.primary.installed .t1 { color: #1f7a4f; }
    .item.primary.installed .t2 { color: #3b8e69; }
    .item.primary.installed .chev { color: var(--brand); }

    /* 로딩 상태 */
    .item.primary.loading { cursor: progress; }
    .item.primary.loading .chev { opacity: 0; }
    .item.primary.loading .spinner {
      position: absolute;
      right: 18px; top: 50%;
      width: 18px; height: 18px;
      margin-top: -9px;
      border: 2px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .item.primary .progress {
      position: absolute;
      left: 0; bottom: 0;
      height: 2px;
      width: 0;
      background: rgba(255,255,255,.7);
      transition: width .2s ease;
    }
    .item.primary.loading .progress { width: 100%; transition: width 2.4s ease; }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 28px;
      font-size: 12px;
      color: var(--text-3);
      font-weight: 500;
    }

    /* Toast */
    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(env(safe-area-inset-bottom) + 24px);
      transform: translateX(-50%) translateY(12px);
      background: var(--navy);
      color: #fff;
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.01em;
      box-shadow: 0 12px 30px -10px rgba(16,26,63,.4);
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease, transform .25s ease;
      z-index: 2147483647;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .item.live .ic::after { animation: none; }
      .item, .toast { transition: none; }
    }
  </style>
</head>
<body>

  <div class="wrap">

    <header class="header">
      <div class="logo">
        <img src="https://cdn.imweb.me/thumbnail/20260516/33c296729aee7.png" alt="Victory Church 로고">
      </div>
      <h1>뉴질랜드 빅토리처치</h1>
      <p>Victory Church · New Zealand</p>
    </header>

    <nav class="menu">

      <!-- 1. 바로가기 설치 -->
      <button class="item primary" id="btnInstall" type="button" data-a2hs>
        <span class="ic">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3v12"/>
            <path d="M7 10l5 5 5-5"/>
            <path d="M5 21h14"/>
          </svg>
        </span>
        <span class="body">
          <span class="t1">이 페이지 바로가기 만들기</span>
          <span class="t2">홈 화면에 추가하면 다음엔 한 번에 열려요</span>
        </span>
        <span class="chev">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
        </span>
        <span class="progress"></span>
      </button>

      <!-- 2. 홈페이지 -->
      <button class="item home" id="btnHome" type="button">
        <span class="ic">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 11l9-8 9 8"/>
            <path d="M5 10v10h14V10"/>
            <path d="M10 20v-6h4v6"/>
          </svg>
        </span>
        <span class="body">
          <span class="t1">교회 홈페이지</span>
          <span class="t2">victorychurch.nz</span>
        </span>
        <span class="chev">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
        </span>
      </button>

      <!-- 3. 유튜브 -->
      <button class="item youtube" id="btnYoutube" type="button">
        <span class="ic">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M21.6 7.2a2.5 2.5 0 0 0-1.8-1.8C18.2 5 12 5 12 5s-6.2 0-7.8.4A2.5 2.5 0 0 0 2.4 7.2C2 8.8 2 12 2 12s0 3.2.4 4.8a2.5 2.5 0 0 0 1.8 1.8C5.8 19 12 19 12 19s6.2 0 7.8-.4a2.5 2.5 0 0 0 1.8-1.8C22 15.2 22 12 22 12s0-3.2-.4-4.8zM10 15V9l5.2 3L10 15z"/>
          </svg>
        </span>
        <span class="body">
          <span class="t1">유튜브 채널</span>
          <span class="t2">설교 영상 보기 · @nzvictory</span>
        </span>
        <span class="chev">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
        </span>
      </button>

      <!-- 4. 라이브 -->
      <button class="item live" id="btnLive" type="button">
        <span class="ic">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M5.6 5.6a9 9 0 0 0 0 12.8M18.4 5.6a9 9 0 0 1 0 12.8"/>
            <path d="M8.5 8.5a5 5 0 0 0 0 7M15.5 8.5a5 5 0 0 1 0 7"/>
          </svg>
        </span>
        <span class="body">
          <span class="t1">실시간 라이브</span>
          <span class="t2">예배 함께 드리기</span>
        </span>
        <span class="chev">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
        </span>
      </button>

    </nav>

    <div class="footer">© Victory Church NZ</div>

  </div>

  <div class="toast" id="toast">바로가기 설치 완료</div>

  <script>
    // 외부 링크
    function openExternal(url) {
      window.open(url, '_blank', 'noopener,noreferrer');
    }
    document.getElementById('btnHome').addEventListener('click', function () {
      openExternal('https://victorychurch.nz/');
    });
    document.getElementById('btnYoutube').addEventListener('click', function () {
      openExternal('https://www.youtube.com/@nzvictory/videos');
    });
    document.getElementById('btnLive').addEventListener('click', function () {
      openExternal('https://www.youtube.com/@nzvictory/streams');
    });

    // 토스트
    var toastEl = document.getElementById('toast');
    var toastTimer = null;
    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function () { toastEl.classList.remove('show'); }, 2400);
    }

    // 설치 버튼 상태 관리
    var installBtn = document.getElementById('btnInstall');
    var installLoadingTimer = null;

    function setInstalled() {
      stopLoading();
      installBtn.classList.add('installed');
      installBtn.querySelector('.t1').textContent = '바로가기가 설치되어 있어요';
      installBtn.querySelector('.t2').textContent = '홈 화면 아이콘에서 바로 열어보세요';
    }
    function startLoading() {
      if (installBtn.classList.contains('installed')) return;
      installBtn.classList.add('loading');
      installBtn.setAttribute('aria-busy', 'true');
      // 로딩 중 스피너 노드 (없으면 추가)
      if (!installBtn.querySelector('.spinner')) {
        var s = document.createElement('span');
        s.className = 'spinner';
        installBtn.appendChild(s);
      }
    }
    function stopLoading() {
      installBtn.classList.remove('loading');
      installBtn.removeAttribute('aria-busy');
      var s = installBtn.querySelector('.spinner');
      if (s) s.remove();
      clearTimeout(installLoadingTimer);
      installLoadingTimer = null;
    }

    // 클릭 → 로딩 시작 (a2hs.js 핸들러보다 먼저)
    // 안전장치: 'appinstalled' 이벤트가 끝내 안 오면 30초 후 로딩만 해제
    // (안내 시트로 흐른 경우, 사용자가 수동 설치 중인 경우 등)
    installBtn.addEventListener('click', function () {
      if (installBtn.classList.contains('installed')) return;
      startLoading();
      installLoadingTimer = setTimeout(function () { stopLoading(); }, 30000);
    }, true);

    // 안내 시트 닫힘 감지 → 로딩 해제 (안내 시트로 분기된 경우)
    function observeSheet() {
      var sheet = document.querySelector('.a2hs-sheet');
      if (!sheet) { return setTimeout(observeSheet, 300); }
      var mo = new MutationObserver(function () {
        if (!sheet.classList.contains('show')) stopLoading();
      });
      mo.observe(sheet, { attributes: true, attributeFilter: ['class'] });
    }
    observeSheet();

    // ⭐ 진짜 설치 완료: 'appinstalled' 이벤트
    // OS가 PWA를 홈 화면/시작 메뉴에 실제로 설치한 직후 발생.
    // → 이때만 완료 표시 + 토스트
    window.addEventListener('appinstalled', function () {
      try { localStorage.setItem('a2hs_installed', '1'); } catch (e) {}
      setInstalled();
      showToast('바로가기 설치 완료');
    });

    // 네이티브 프롬프트 결과 처리
    // - accepted: 사용자가 "설치"를 눌렀을 뿐, 실제 완료는 아직 → 로딩 유지
    //   ('appinstalled' 이벤트가 곧 와서 완료 처리함)
    // - dismissed: 사용자가 거절 → 로딩 해제, 완료 표시 ❌
    window.addEventListener('a2hs:result', function (e) {
      if (!e.detail) return;
      if (e.detail.outcome === 'dismissed') {
        stopLoading();
      }
      // accepted 인 경우 일부러 아무것도 하지 않음 — appinstalled 대기
    });

    // standalone (이미 홈 화면 앱으로 열린 경우) — 조용히 완료 상태 표시
    function checkStandalone() {
      var standalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
                       || window.navigator.standalone === true;
      if (standalone && !installBtn.classList.contains('installed')) {
        try { localStorage.setItem('a2hs_installed', '1'); } catch (e) {}
        setInstalled();
      }
      return standalone;
    }
    checkStandalone();

    // display-mode 변경 감지 — 브라우저에서 PWA로 모드가 바뀌는 순간 잡힘
    if (window.matchMedia) {
      try {
        window.matchMedia('(display-mode: standalone)').addEventListener('change', function (e) {
          if (e.matches) checkStandalone();
        });
      } catch (err) {}
    }

    // 서비스워커
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch(function(){});
    }
  </script>

  <!-- A2HS 위젯 -->
  <script src="a2hs.js" defer
    data-site-name="Victory Church"
    data-icon="https://cdn.imweb.me/thumbnail/20260516/33c296729aee7.png"
    data-auto-banner="false"></script>
</body>
</html>
